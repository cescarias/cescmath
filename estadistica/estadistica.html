<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratori d'Estadística 1r Batxillerat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { background-color: #f8fafc; }
        .table-sticky-header th { position: sticky; top: 0; background: #f8fafc; z-index: 10; }
        .katex { font-size: 1.1em; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONS ---
        const Icon = ({ path, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d={path} />
            </svg>
        );

        const icons = {
            barChart: "M12 20V10 M18 20V4 M6 20v-6",
            scatter: "M3 3v18h18 M8 14l.01 0 M12 10l.01 0 M16 6l.01 0 M10 18l.01 0 M14 14l.01 0",
            table: "M3 3h18v18H3z M3 9h18 M9 21V9",
            calculator: "M16 16h.01 M12 16h.01 M8 16h.01 M16 12h.01 M12 12h.01 M8 12h.01 M16 8h.01 M12 8h.01 M8 8h.01 M4 20h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z",
            trash: "M3 6h18 M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6 M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2",
            refresh: "M23 4v6h-6 M1 20v-6h6",
            target: "M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 16a6 6 0 1 1 6-6 6 6 0 0 1-6 6z M12 8v8 M8 12h8",
            upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12",
            analysis: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8",
            bell: "M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9",
            close: "M18 6 6 18 M6 6 18 18",
            grid: "M3 3h18v18H3z M3 9h18 M3 15h18 M9 3v18 M15 3v18",
            ruler: "M2 12h20 M12 2v20",
            formula: "M8 6h10M8 12h10M8 18h10M4 6h1M4 12h1M4 18h1",
            list: "M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01",
            info: "M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
        };

        // --- COMPONENTS ---
        const Latex = ({ children, block = false }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.katex && containerRef.current) {
                    try {
                        let content = "";
                        if (typeof children === 'string') content = children;
                        else if (Array.isArray(children)) content = children.join('');
                        else content = String(children);
                        
                        window.katex.render(content, containerRef.current, { throwOnError: false, displayMode: block });
                    } catch (e) { containerRef.current.innerText = String(children); }
                }
            }, [children, block]);
            return <span ref={containerRef} />;
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col animate-[fadeIn_0.2s_ease-out]">
                        <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 rounded-t-xl">
                            <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><Icon path={icons.analysis} /> {title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icon path={icons.close} /></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar text-slate-700 leading-relaxed">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // --- MATH HELPERS ---
        const mean = arr => arr.length > 0 ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
        const variance = (arr, avg) => arr.length ? arr.reduce((a,b)=>a+Math.pow(b-avg,2),0)/arr.length : 0;
        const stdDev = v => Math.sqrt(v);
        const quantile = (sorted, q) => {
            if (!sorted.length) return 0;
            const pos = (sorted.length - 1) * q;
            const base = Math.floor(pos);
            return sorted[base] + (pos - base) * ((sorted[base + 1] || sorted[base]) - sorted[base]);
        };
        const mode = arr => {
            if (!arr.length) return "-";
            const freq = {}; let max = 0;
            arr.forEach(v => { freq[v]=(freq[v]||0)+1; if(freq[v]>max) max=freq[v]; });
            if (max===1 && arr.length>1) return "Cap";
            return Object.keys(freq).filter(k=>freq[k]===max).map(Number).sort((a,b)=>a-b).join(', ');
        };
        
        // Probability Functions
        const factorial = n => n <= 1 ? 1 : n * factorial(n - 1);
        const combinations = (n, k) => factorial(n) / (factorial(k) * factorial(n - k));
        const binomialPMF = (n, p, k) => combinations(n, k) * Math.pow(p, k) * Math.pow(1 - p, n - k);
        const erf = (x) => {
            const t = 1 / (1 + 0.3275911 * Math.abs(x));
            const poly = 0.254829592*t - 0.284496736*t*t + 1.421413741*t*t*t - 1.453152027*t*t*t*t + 1.061405429*t*t*t*t*t;
            const res = 1 - poly * Math.exp(-x*x);
            return x >= 0 ? res : -res;
        };
        const normalCDF = (x, mu, sigma) => 0.5 * (1 + erf((x - mu) / (sigma * Math.sqrt(2))));
        
        const gamma = (z) => {
            const p = [676.5203681218851, -1259.1392167224028, 771.32342877765313, -176.61502916214059, 12.507343278686905, -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
            if (z < 0.5) return Math.PI / (Math.sin(Math.PI * z) * gamma(1 - z));
            z -= 1;
            let x = 0.99999999999980993;
            for (let i = 0; i < p.length; i++) x += p[i] / (z + i + 1);
            const t = z + p.length - 0.5;
            return Math.sqrt(2 * Math.PI) * Math.pow(t, z + 0.5) * Math.exp(-t) * x;
        };
        const chiSquarePDF = (x, k) => {
            if (x <= 0) return 0;
            return (Math.pow(x, k/2 - 1) * Math.exp(-x/2)) / (Math.pow(2, k/2) * gamma(k/2));
        };
        const fDistPDF = (x, d1, d2) => {
             if (x < 0) return 0;
             const term1 = Math.pow(d1/d2, d1/2) * Math.pow(x, d1/2 - 1);
             const term2 = gamma(d1/2) * gamma(d2/2) / gamma((d1+d2)/2);
             const term3 = Math.pow(1 + (d1/d2)*x, (d1+d2)/2);
             return term1 / (term2 * term3);
        }
        const integrate = (func, start, end, steps=100) => {
            const h = (end - start) / steps;
            let sum = 0.5 * (func(start) + func(end));
            for(let i=1; i<steps; i++) sum += func(start + i*h);
            return sum * h;
        };
        const getZScore = (conf) => {
            if (conf === 90) return 1.645;
            if (conf === 95) return 1.96;
            if (conf === 99) return 2.576;
            return 1.96; 
        };
        
        const getChi2Crit = (p, df) => {
            let z = 0;
            if (Math.abs(p - 0.025) < 0.001) z = -1.96;
            else if (Math.abs(p - 0.975) < 0.001) z = 1.96;
            else if (Math.abs(p - 0.05) < 0.001) z = -1.645;
            else if (Math.abs(p - 0.95) < 0.001) z = 1.645;
            
            const val = df * Math.pow(1 - 2/(9*df) + z * Math.sqrt(2/(9*df)), 3);
            return val > 0 ? val : 0.1;
        };

        // --- FORMULARY COMPONENT ---
        const Formulary = () => {
            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 p-4 overflow-y-auto custom-scrollbar h-full pb-20">
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                        <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">Estadística Unidimensional</h3>
                        <div className="space-y-4 text-sm">
                            <div><span className="font-bold">Mitjana:</span> <Latex block>{`\\bar{x} = \\frac{\\sum x_i n_i}{N}`}</Latex></div>
                            <div><span className="font-bold">Variància:</span> <Latex block>{`\\sigma^2 = \\frac{\\sum (x_i - \\bar{x})^2 n_i}{N}`}</Latex></div>
                            <div><span className="font-bold">Desviació Típica:</span> <Latex block>{`\\sigma = \\sqrt{\\sigma^2}`}</Latex></div>
                            <div><span className="font-bold">Coef. Variació:</span> <Latex block>{`CV = \\frac{\\sigma}{|\\bar{x}|} \\cdot 100`}</Latex></div>
                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                        <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">Estadística Bidimensional</h3>
                        <div className="space-y-4 text-sm">
                            <div><span className="font-bold">Covariància:</span> <Latex block>{`\\sigma_{xy} = \\frac{\\sum (x_i - \\bar{x})(y_i - \\bar{y})}{N}`}</Latex></div>
                            <div><span className="font-bold">Correlació:</span> <Latex block>{`r = \\frac{\\sigma_{xy}}{\\sigma_x \\sigma_y}`}</Latex></div>
                            <div><span className="font-bold">Recta Regressió:</span> <Latex block>{`y - \\bar{y} = \\frac{\\sigma_{xy}}{\\sigma_x^2} (x - \\bar{x})`}</Latex></div>
                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                        <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">Probabilitat i Distribucions</h3>
                        <div className="space-y-4 text-sm">
                            <div><span className="font-bold">Binomial B(n, p):</span> <Latex block>{`P(X=k) = \\binom{n}{k} p^k (1-p)^{n-k}`}</Latex></div>
                            <div><span className="font-bold">Normal N(\mu, \sigma):</span> <Latex block>{`Z = \\frac{X - \\mu}{\\sigma} \\sim N(0, 1)`}</Latex></div>
                        </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                        <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">Intervals de Confiança</h3>
                        <div className="space-y-4 text-sm">
                            <div><span className="font-bold">Mitjana (Normal):</span> <Latex block>{`\\bar{x} \\pm z_{\\alpha/2}\\frac{\\sigma}{\\sqrt{n}}`}</Latex></div>
                            <div><span className="font-bold">Proporció (Binomial):</span> <Latex block>{`\\hat{p} \\pm z_{\\alpha/2}\\sqrt{\\frac{\\hat{p}(1-\\hat{p})}{n}}`}</Latex></div>
                            <div><span className="font-bold">Variància (Khi²):</span> <Latex block>{`\\left( \\frac{(n-1)s^2}{\\chi^2_{\\alpha/2}}, \\frac{(n-1)s^2}{\\chi^2_{1-\\alpha/2}} \\right)`}</Latex></div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 1D STATS COMPONENT ---
        const Stats1D = () => {
            const [inputStr, setInputStr] = useState("5, 6, 6, 7, 7, 7, 8, 8, 9, 10");
            const [data, setData] = useState([]);
            const [stats, setStats] = useState(null);
            const [freqTable, setFreqTable] = useState([]);
            const [chartType, setChartType] = useState('both');
            const [showAnalysis, setShowAnalysis] = useState(false);
            const fileRef = useRef(null);

            useEffect(() => {
                const arr = inputStr.split(/[\s,;]+/).map(n => parseFloat(n)).filter(n => !isNaN(n)).sort((a, b) => a - b);
                setData(arr);
                if (arr.length > 0) {
                    const avg = mean(arr); const vari = variance(arr, avg); const std = stdDev(vari);
                    const q1 = quantile(arr, 0.25); const q2 = quantile(arr, 0.5); const q3 = quantile(arr, 0.75);
                    setStats({ n: arr.length, mean: avg, median: q2, mode: mode(arr), variance: vari, stdDev: std, cv: (avg!==0?std/Math.abs(avg)*100:0), min: arr[0], max: arr[arr.length-1], q1, q3, iqr: q3-q1 });
                    const fMap = {}; arr.forEach(x => fMap[x]=(fMap[x]||0)+1);
                    const distinct = Object.keys(fMap).map(Number).sort((a,b)=>a-b);
                    let cum=0;
                    setFreqTable(distinct.map(x => { const ni=fMap[x]; cum+=ni; return { x, ni, Ni:cum, fi:ni/arr.length }; }));
                } else { setStats(null); setFreqTable([]); }
            }, [inputStr]);

            const analysisText = useMemo(() => {
                if (!stats) return null;
                const asimetria = stats.mean > stats.median ? "positiva (cua a la dreta)" : stats.mean < stats.median ? "negativa (cua a l'esquerra)" : "simètrica";
                const dispersion = stats.cv < 15 ? "baixa (dades homogènies)" : stats.cv < 30 ? "moderada" : "alta (dades disperses)";
                return (
                    <div className="space-y-4">
                        <div><h4 className="font-bold text-indigo-700">Centralització i Forma</h4><p>Mitjana: <strong>{stats.mean.toFixed(2)}</strong>, Mediana: <strong>{stats.median.toFixed(2)}</strong>. Distribució <strong>{asimetria}</strong>. Moda: {stats.mode}.</p></div>
                        <div><h4 className="font-bold text-indigo-700">Dispersió</h4><p>Desviació típica: <strong>{stats.stdDev.toFixed(2)}</strong>. CV: <strong>{stats.cv.toFixed(1)}%</strong> ({dispersion}).</p></div>
                    </div>
                );
            }, [stats]);

            const handleFile = (e) => {
                const f = e.target.files[0]; if(!f)return;
                const r = new FileReader(); r.onload=ev=>setInputStr(ev.target.result.replace(/[\r\n]+/g,',').split(/[^0-9.\-]+/).filter(n=>!isNaN(parseFloat(n))).join(', '));
                r.readAsText(f); e.target.value=null;
            };

            const generateRandom = () => {
                const arr = Array.from({length: 20}, () => Math.floor(Math.random() * 10) + 1);
                setInputStr(arr.join(', '));
            };

            const width=600; const height=300; const pad=40;

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
                    <Modal isOpen={showAnalysis} onClose={() => setShowAnalysis(false)} title="Anàlisi Unidimensional">{analysisText}</Modal>
                    <div className="lg:col-span-4 flex flex-col gap-4">
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                            <div className="flex justify-between items-center mb-2">
                                <label className="text-xs font-bold text-slate-400 uppercase">Dades</label>
                                <div className="flex gap-2">
                                    <input type="file" ref={fileRef} onChange={handleFile} className="hidden" />
                                    <button onClick={()=>fileRef.current.click()} className="text-emerald-600 bg-emerald-50 px-2 py-1 rounded text-xs font-bold border border-emerald-100"><Icon path={icons.upload} size={14}/> CSV</button>
                                    <button onClick={generateRandom} className="text-indigo-600 bg-indigo-50 px-2 py-1 rounded text-xs font-bold border border-indigo-100"><Icon path={icons.refresh} size={14}/> Aleatori</button>
                                </div>
                            </div>
                            <textarea value={inputStr} onChange={e=>setInputStr(e.target.value)} className="w-full h-24 p-3 border rounded outline-none font-mono text-sm resize-none"/>
                        </div>
                        {stats && (
                            <div className="bg-indigo-50/50 rounded-xl border border-indigo-100 p-5 flex flex-col gap-3 overflow-y-auto custom-scrollbar flex-1">
                                <div className="flex justify-between items-center"><h3 className="text-sm font-bold text-indigo-800 uppercase"><Icon path={icons.calculator} size={16}/> Paràmetres</h3><button onClick={()=>setShowAnalysis(true)} className="text-xs bg-indigo-600 text-white px-2 py-1 rounded hover:bg-indigo-700 transition">Veure Anàlisi</button></div>
                                <div className="grid grid-cols-2 gap-x-4 gap-y-2 text-sm">
                                    <div className="flex justify-between border-b border-indigo-100"><span><Latex>{"\\bar{x}"}</Latex></span> <span className="font-mono font-bold">{stats.mean.toFixed(2)}</span></div>
                                    <div className="flex justify-between border-b border-indigo-100"><span><Latex>{"\\sigma"}</Latex></span> <span className="font-mono font-bold">{stats.stdDev.toFixed(2)}</span></div>
                                    <div className="flex justify-between border-b border-indigo-100"><span>Me</span> <span className="font-mono font-bold">{stats.median.toFixed(2)}</span></div>
                                    <div className="flex justify-between border-b border-indigo-100"><span>CV</span> <span className="font-mono font-bold">{stats.cv.toFixed(1)}%</span></div>
                                    <div className="flex justify-between border-b border-indigo-100"><span>Mo</span> <span className="font-mono font-bold">{stats.mode}</span></div>
                                    <div className="flex justify-between border-b border-indigo-100"><span>IQR</span> <span className="font-mono font-bold">{stats.iqr.toFixed(2)}</span></div>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="lg:col-span-8 flex flex-col gap-6">
                        <div className="bg-white rounded-xl shadow-lg border border-slate-200 p-2 h-[400px] relative">
                            <div className="absolute top-4 right-4 z-10 flex gap-1 bg-white/90 p-1 rounded border shadow-sm">
                                {['histo','box','both'].map(t => <button key={t} onClick={()=>setChartType(t)} className={`px-2 py-1 text-xs rounded ${chartType===t?'bg-indigo-100 text-indigo-700':'hover:bg-slate-50'}`}>{t==='histo'?'Histo':t==='box'?'Caixa':'Tots'}</button>)}
                            </div>
                            {stats ? (
                                <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full" preserveAspectRatio="none">
                                    <line x1={pad} y1={height-pad} x2={width-pad} y2={height-pad} stroke="#334155" strokeWidth="2"/>
                                    {(chartType==='histo'||chartType==='both') && freqTable.map((d,i)=>{
                                        const maxF=Math.max(...freqTable.map(f=>f.ni)), range=stats.max-stats.min+2;
                                        const x=pad+((d.x-stats.min+1-0.4)/range)*(width-2*pad), w=(0.8/range)*(width-2*pad), h=(d.ni/maxF)*(height/2-pad);
                                        return <rect key={i} x={x} y={height-pad-h} width={w} height={h} fill="#6366f1" fillOpacity="0.3" stroke="#4f46e5"/>;
                                    })}
                                    {(chartType==='box'||chartType==='both') && (() => {
                                        const range=stats.max-stats.min+2, mapX=v=>pad+((v-stats.min+1)/range)*(width-2*pad);
                                        const y=chartType==='box'?height/2-20:60;
                                        return (
                                            <g>
                                                <line x1={mapX(stats.min)} y1={y+20} x2={mapX(stats.q1)} y2={y+20} stroke="#334155" strokeWidth="2"/>
                                                <line x1={mapX(stats.q3)} y1={y+20} x2={mapX(stats.max)} y2={y+20} stroke="#334155" strokeWidth="2"/>
                                                <line x1={mapX(stats.min)} y1={y+10} x2={mapX(stats.min)} y2={y+30} stroke="#334155" strokeWidth="2"/>
                                                <line x1={mapX(stats.max)} y1={y+10} x2={mapX(stats.max)} y2={y+30} stroke="#334155" strokeWidth="2"/>
                                                <rect x={mapX(stats.q1)} y={y} width={mapX(stats.q3)-mapX(stats.q1)} height={40} fill="#10b981" fillOpacity="0.4" stroke="#059669" strokeWidth="2"/>
                                                <line x1={mapX(stats.median)} y1={y} x2={mapX(stats.median)} y2={y+40} stroke="#064e3b" strokeWidth="3"/>
                                            </g>
                                        );
                                    })()}
                                </svg>
                            ) : <div className="h-full flex items-center justify-center text-slate-400 italic">Sense dades</div>}
                        </div>
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex-1 overflow-auto custom-scrollbar">
                            <table className="w-full text-sm text-left table-sticky-header">
                                <thead className="bg-slate-50 text-xs uppercase text-slate-500"><tr><th className="px-4 py-2"><Latex>{"x_i"}</Latex></th><th className="px-4 py-2"><Latex>{"n_i"}</Latex></th><th className="px-4 py-2"><Latex>{"N_i"}</Latex></th><th className="px-4 py-2">%</th></tr></thead>
                                <tbody className="divide-y divide-slate-100">{freqTable.map((r,i)=><tr key={i}><td className="px-4 py-1 font-bold">{r.x}</td><td className="px-4 py-1">{r.ni}</td><td className="px-4 py-1 text-slate-400">{r.Ni}</td><td className="px-4 py-1 text-indigo-600">{(r.fi*100).toFixed(1)}%</td></tr>)}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 2D STATS COMPONENT ---
        const Stats2D = () => {
            const [points, setPoints] = useState([{x:1,y:2},{x:2,y:3},{x:3,y:2.5},{x:4,y:4.5},{x:5,y:4},{x:6,y:5}]);
            const [stats, setStats] = useState(null);
            const [showAnalysis, setShowAnalysis] = useState(false);
            const [predX, setPredX] = useState(7);
            const fileRef = useRef(null);
            const graphRef = useRef(null);

            useEffect(() => {
                if(points.length<2) { setStats(null); return; }
                const n=points.length;
                const sx=points.reduce((a,b)=>a+b.x,0), sy=points.reduce((a,b)=>a+b.y,0);
                const mx=sx/n, my=sy/n;
                const sxx=points.reduce((a,b)=>a+Math.pow(b.x-mx,2),0)/n, syy=points.reduce((a,b)=>a+Math.pow(b.y-my,2),0)/n;
                const sxy=points.reduce((a,b)=>a+(b.x-mx)*(b.y-my),0)/n;
                const m=sxy/sxx, b=my-m*mx, r=sxy/Math.sqrt(sxx*syy);
                setStats({ n, mx, my, sx:Math.sqrt(sxx), sy:Math.sqrt(syy), sxy, r, m, b });
            }, [points]);

            const analysisText = useMemo(() => {
                if(!stats) return null;
                const rAbs = Math.abs(stats.r);
                const strength = rAbs > 0.8 ? "molt forta" : rAbs > 0.5 ? "moderada" : "dèbil";
                const dir = stats.r > 0 ? "positiva (directa)" : "negativa (inversa)";
                return (
                    <div className="space-y-3">
                        <p>Correlació <strong><Latex>{`r = ${stats.r.toFixed(4)}`}</Latex></strong> ({strength}, {dir}).</p>
                        <p>Covariància <Latex>{`\\sigma_{xy} = ${stats.sxy.toFixed(2)}`}</Latex>.</p>
                        <p>Recta de regressió: <Latex>{`y = ${stats.m.toFixed(2)}x ${stats.b>=0?'+':''} ${Math.abs(stats.b).toFixed(2)}`}</Latex>.</p>
                    </div>
                );
            }, [stats]);

            const generateRandom = () => {
                const pts = [];
                for(let i=0; i<20; i++) {
                    const x = Math.random() * 10;
                    const noise = (Math.random() - 0.5) * 4;
                    const y = Math.max(0, Math.min(10, 0.8 * x + 2 + noise));
                    pts.push({x: Math.round(x*10)/10, y: Math.round(y*10)/10});
                }
                setPoints(pts);
            };

            const handleFile = (e) => {
                const f=e.target.files[0]; if(!f)return;
                const r=new FileReader(); r.onload=ev=>{
                    const pts = ev.target.result.split(/[\r\n]+/).map(l=>l.split(/[,;\t]+/).map(Number).filter(n=>!isNaN(n))).filter(p=>p.length>=2).map(p=>({x:p[0],y:p[1]}));
                    if(pts.length) setPoints(pts); else alert("Error de format");
                }; r.readAsText(f); e.target.value=null;
            };

            const w=800, h=500, p=50, maxX=12, maxY=10;
            const mapX=v=>p+(v/maxX)*(w-2*p), mapY=v=>(h-p)-(v/maxY)*(h-2*p);
            const invX=v=>((v-p)/(w-2*p))*maxX, invY=v=>((h-p-v)/(h-2*p))*maxY;

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
                    <Modal isOpen={showAnalysis} onClose={()=>setShowAnalysis(false)} title="Anàlisi de Regressió">{analysisText}</Modal>
                    <div className="lg:col-span-4 flex flex-col gap-4">
                        {stats ? (
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col gap-4">
                                <div className="flex justify-between items-center"><h3 className="font-bold text-slate-700 uppercase flex items-center gap-2"><Icon path={icons.calculator}/> Estadístiques</h3><button onClick={()=>setShowAnalysis(true)} className="text-xs bg-emerald-600 text-white px-2 py-1 rounded hover:bg-emerald-700">Anàlisi</button></div>
                                <div className="bg-slate-50 p-3 rounded text-sm space-y-2">
                                    <div className="flex justify-between"><span>Marginals</span> <span className="font-mono text-xs"><Latex>{`\\bar{x}=${stats.mx.toFixed(2)}, \\bar{y}=${stats.my.toFixed(2)}`}</Latex></span></div>
                                    <div className="flex justify-between font-bold"><span><Latex>{"r"}</Latex></span> <span className="font-mono text-indigo-700">{stats.r.toFixed(4)}</span></div>
                                </div>
                                <div className="bg-indigo-50 p-3 rounded border border-indigo-100 text-center">
                                    <div className="text-xs text-indigo-400 uppercase font-bold mb-1">Recta de Regressió</div>
                                    <div className="font-mono font-bold text-indigo-800 text-lg"><Latex>{`y = ${stats.m.toFixed(2)}x ${stats.b>=0?'+':''} ${Math.abs(stats.b).toFixed(2)}`}</Latex></div>
                                </div>
                                <div className="bg-emerald-50 p-3 rounded border border-emerald-100">
                                    <div className="flex items-center gap-2 mb-1 justify-center"><span className="text-sm font-bold text-emerald-700">Predicció: x = </span><input type="number" value={predX} onChange={e=>setPredX(parseFloat(e.target.value))} className="w-16 p-1 border rounded text-center font-mono"/></div>
                                    <div className="text-center font-mono font-bold text-emerald-800"><Latex>{`y \\approx ${(stats.m*predX+stats.b).toFixed(2)}`}</Latex></div>
                                </div>
                            </div>
                        ) : <div className="bg-white p-5 rounded border text-center italic text-slate-400">Afegeix punts</div>}
                        
                        <div className="bg-white rounded border flex-1 overflow-hidden flex flex-col min-h-[200px]">
                            <div className="px-4 py-2 border-b bg-slate-50 flex justify-between items-center"><span className="text-xs font-bold uppercase">Punts</span>
                                <div className="flex gap-1">
                                    <input type="file" ref={fileRef} onChange={handleFile} className="hidden"/>
                                    <button onClick={()=>fileRef.current.click()} className="p-1 text-emerald-600 bg-emerald-50 rounded border border-emerald-100" title="Importar CSV"><Icon path={icons.upload} size={14}/></button>
                                    <button onClick={generateRandom} className="p-1 text-indigo-600 bg-indigo-50 rounded border border-indigo-100" title="Aleatori"><Icon path={icons.refresh} size={14}/></button>
                                    <button onClick={()=>setPoints([])} className="p-1 text-red-500 hover:text-red-700"><Icon path={icons.trash} size={14}/></button>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto custom-scrollbar p-2 grid grid-cols-2 gap-2 h-0">
                                {points.map((p,i)=><div key={i} className="flex justify-between bg-slate-50 p-1 px-2 rounded border text-xs font-mono"><span>P{i+1}</span><span>({p.x}, {p.y})</span></div>)}
                            </div>
                        </div>
                    </div>
                    <div className="lg:col-span-8 bg-white rounded-xl shadow-lg border border-slate-200 h-[600px] relative overflow-hidden" ref={graphRef}
                         onClick={e=>{
                             const r=graphRef.current.getBoundingClientRect();
                             const x=e.clientX-r.left, y=e.clientY-r.top;
                             if(x>p && x<w-p && y>p && y<h-p) setPoints([...points, {x:Math.round(invX(x*w/r.width)*10)/10, y:Math.round(invY(y*h/r.height)*10)/10}]);
                         }}>
                        <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-full cursor-crosshair">
                            <defs><pattern id="g2d" width={w/maxX} height={h/maxY} patternUnits="userSpaceOnUse"><path d={`M ${w/maxX} 0 L 0 0 0 ${h/maxY}`} fill="none" stroke="#f1f5f9"/></pattern></defs>
                            <rect width="100%" height="100%" fill="url(#g2d)"/>
                            <line x1={p} y1={h-p} x2={w-p} y2={h-p} stroke="#334155" strokeWidth="2"/><line x1={p} y1={h-p} x2={p} y2={p} stroke="#334155" strokeWidth="2"/>
                            {Array.from({length:maxX+1}).map((_,i)=><text key={'x'+i} x={mapX(i)} y={h-p+15} textAnchor="middle" className="text-xs fill-slate-400 pointer-events-none">{i}</text>)}
                            {Array.from({length:maxY+1}).map((_,i)=><text key={'y'+i} x={p-10} y={mapY(i)+4} textAnchor="end" className="text-xs fill-slate-400 pointer-events-none">{i}</text>)}
                            
                            {stats && <line x1={mapX(0)} y1={mapY(stats.b)} x2={mapX(maxX)} y2={mapY(stats.m*maxX+stats.b)} stroke="#6366f1" strokeWidth="2" strokeDasharray="5,5"/>}
                            {stats && <g opacity="0.5"><line x1={mapX(stats.mx)} y1={p} x2={mapX(stats.mx)} y2={h-p} stroke="#10b981" strokeDasharray="2,2"/><line x1={p} y1={mapY(stats.my)} x2={w-p} y2={mapY(stats.my)} stroke="#10b981" strokeDasharray="2,2"/><circle cx={mapX(stats.mx)} cy={mapY(stats.my)} r="6" fill="#10b981"/></g>}
                            {points.map((pt,i)=><circle key={i} cx={mapX(pt.x)} cy={mapY(pt.y)} r="5" fill="#f43f5e" stroke="white" strokeWidth="2"/>)}
                            {stats && <circle cx={mapX(predX)} cy={mapY(stats.m*predX+stats.b)} r="6" fill="white" stroke="#6366f1" strokeWidth="3"/>}
                        </svg>
                    </div>
                </div>
            );
        };

        // --- DISTRIBUTIONS COMPONENT ---
        const Distributions = () => {
            const [type, setType] = useState('normal'); 
            const [biN, setBiN] = useState(10); const [biP, setBiP] = useState(0.5); const [biK, setBiK] = useState(5);
            const [mu, setMu] = useState(0); const [sigma, setSigma] = useState(1); const [normX, setNormX] = useState(1);
            const [df1, setDf1] = useState(5); const [df2, setDf2] = useState(10); const [chiK, setChiK] = useState(5); const [chiX, setChiX] = useState(2);
            
            const [sampleMean, setSampleMean] = useState(100); const [sampleN, setSampleN] = useState(30); const [confLevel, setConfLevel] = useState(95);
            
            // Chi Variance CI
            const [sampleVar, setSampleVar] = useState(10); const [chiConfLevel, setChiConfLevel] = useState(95); const [chiSampleN, setChiSampleN] = useState(20);

            const [showAnalysis, setShowAnalysis] = useState(false);
            const [procedureType, setProcedureType] = useState(null); 
            const [showGrid, setShowGrid] = useState(true);
            const [showScale, setShowScale] = useState(true);
            const fileRef = useRef(null);

            const w=1200, h=400, p=40; // Increased width for better full-width graph

            const analysisText = useMemo(() => {
                if(type === 'binomial') return <div className="space-y-3"><p><strong>Binomial B({biN}, {biP})</strong></p><p>E[X] = {(biN*biP).toFixed(2)}, Var[X] = {(biN*biP*(1-biP)).toFixed(2)}.</p></div>;
                if(type === 'normal') return <div className="space-y-3"><p><strong>Normal N({mu}, {sigma})</strong></p><p>Distribució simètrica fonamental.</p></div>;
                if(type === 'chi') return <div className="space-y-3"><p><strong>Khi-quadrat ({chiK} gl)</strong></p><p>E[X] = {chiK}, Var[X] = {2*chiK}.</p></div>;
                return <div className="space-y-3"><p><strong>F-Snedecor</strong></p></div>;
            }, [type, biN, biP, mu, sigma, confLevel, sampleN, sampleMean, chiK, df1, df2]);

            const handleFile = (e) => {
                const f = e.target.files[0]; if(!f)return;
                const r = new FileReader(); r.onload=ev=> {
                    const arr = ev.target.result.split(/[\s,;]+/).map(n=>parseFloat(n)).filter(n=>!isNaN(n));
                    if(arr.length>1) {
                        const m = mean(arr); const v = variance(arr, m); const s = stdDev(v);
                        if(type==='normal'){ setMu(Number(m.toFixed(2))); setSigma(Number(s.toFixed(2))); }
                        if(type==='chi') setChiK(Math.round(m)); 
                        if(type==='binomial') { 
                            const estimatedN = Math.max(...arr);
                            setBiN(estimatedN); setBiP(Number((m/estimatedN).toFixed(2)));
                        }
                    }
                }; r.readAsText(f); e.target.value=null;
            };

            const getProcedureText = () => {
                const legend = (
                    <div className="bg-slate-100 p-3 rounded mb-4 text-xs border border-slate-200">
                        <h5 className="font-bold mb-1 flex items-center gap-1"><Icon path={icons.info} size={14}/> Llegenda de Símbols</h5>
                        <div className="grid grid-cols-2 gap-2">
                            <div><Latex>{"\\alpha"}</Latex>: Nivell de significació (1 - Confiança)</div>
                            <div><Latex>{"z_{\\alpha/2}"}</Latex>: Valor crític (Normal)</div>
                            <div><Latex>{"E"}</Latex>: Marge d'Error</div>
                            <div><Latex>{"\\sigma"}</Latex>: Desviació Típica Poblacional</div>
                            <div><Latex>{"n"}</Latex>: Grandària de la Mostra</div>
                            <div><Latex>{"\\chi^2"}</Latex>: Valor crític Khi-quadrat</div>
                        </div>
                    </div>
                );

                if (procedureType === 'normal') {
                    const z = getZScore(confLevel); const error = z * (sigma / Math.sqrt(sampleN));
                    const ciLower = sampleMean - error; const ciUpper = sampleMean + error;
                    return (
                        <div className="space-y-4 text-slate-700">
                            {legend}
                            <div className="border-b pb-2"><h4 className="font-bold text-slate-700">Pas 1: Dades</h4><ul className="text-sm list-disc pl-5 mt-1 text-slate-600"><li>Mitjana (<Latex>{`\\bar{x}`}</Latex>): {sampleMean}</li><li>Desv. típica (<Latex>{`\\sigma`}</Latex>): {sigma}</li><li>n: {sampleN}</li><li>Nivell: {confLevel}%</li></ul></div>
                            <div className="border-b pb-2"><h4 className="font-bold text-slate-700">Pas 2: Valor Crític</h4><p className="text-sm">z = {z}</p></div>
                            <div className="border-b pb-2"><h4 className="font-bold text-slate-700">Pas 3: Error</h4><p className="text-sm font-mono"><Latex>{`E = ${z} \\cdot \\frac{${sigma}}{\\sqrt{${sampleN}}} = ${error.toFixed(4)}`}</Latex></p></div>
                            <div><h4 className="font-bold text-slate-700">Pas 4: Interval</h4><p className="text-sm font-mono bg-emerald-50 p-2 rounded border border-emerald-200 text-emerald-800 font-bold"><Latex>{`(${ciLower.toFixed(2)}, ${ciUpper.toFixed(2)})`}</Latex></p></div>
                        </div>
                    );
                }
                if (procedureType === 'binomial') {
                    const z = getZScore(confLevel);
                    const pEst = biP; const n = biN;
                    const error = z * Math.sqrt((pEst*(1-pEst))/n);
                    const ciLower = pEst - error; const ciUpper = pEst + error;
                    return (
                        <div className="space-y-4 text-slate-700">
                            {legend}
                            <div className="border-b pb-2"><h4 className="font-bold text-slate-700">Pas 1: Dades</h4><ul className="text-sm list-disc pl-5 mt-1 text-slate-600"><li>Proporció (<Latex>{`\\hat{p}`}</Latex>): {pEst}</li><li>n: {n}</li><li>Nivell: {confLevel}%</li></ul></div>
                            <div className="border-b pb-2"><h4 className="font-bold text-slate-700">Pas 2: Valor Crític</h4><p className="text-sm">z = {z}</p></div>
                            <div className="border-b pb-2"><h4 className="font-bold text-slate-700">Pas 3: Error</h4><p className="text-sm font-mono"><Latex>{`E = ${z} \\sqrt{\\frac{${pEst}(1-${pEst})}{${n}}} = ${error.toFixed(4)}`}</Latex></p></div>
                            <div><h4 className="font-bold text-slate-700">Pas 4: Interval</h4><p className="text-sm font-mono bg-emerald-50 p-2 rounded border border-emerald-200 text-emerald-800 font-bold"><Latex>{`(${ciLower.toFixed(3)}, ${ciUpper.toFixed(3)})`}</Latex></p></div>
                        </div>
                    );
                }
                if (procedureType === 'chi') {
                    const alpha = (100 - chiConfLevel)/100;
                    const df = chiSampleN - 1;
                    const chiLower = getChi2Crit(alpha/2, df);
                    const chiUpper = getChi2Crit(1-alpha/2, df);
                    const lowerLim = (df * sampleVar) / chiUpper;
                    const upperLim = (df * sampleVar) / chiLower;
                    return (
                        <div className="space-y-4 text-slate-700">
                            {legend}
                            <div className="border-b pb-2"><h4 className="font-bold text-slate-700">Pas 1: Dades</h4><ul className="text-sm list-disc pl-5 mt-1 text-slate-600"><li>Variància (<Latex>{`s^2`}</Latex>): {sampleVar}</li><li>n: {chiSampleN}</li><li>Graus llibertat: {df}</li></ul></div>
                            <div className="border-b pb-2"><h4 className="font-bold text-slate-700">Pas 2: Valors Crítics</h4><p className="text-sm"><Latex>{`\\chi^2_{lower} = ${chiLower.toFixed(2)}, \\chi^2_{upper} = ${chiUpper.toFixed(2)}`}</Latex></p></div>
                            <div><h4 className="font-bold text-slate-700">Pas 3: Interval</h4><p className="text-sm font-mono bg-emerald-50 p-2 rounded border border-emerald-200 text-emerald-800 font-bold"><Latex>{`(${lowerLim.toFixed(2)}, ${upperLim.toFixed(2)})`}</Latex></p></div>
                        </div>
                    );
                }
                if (procedureType === 'f') {
                    return (
                        <div className="space-y-4 text-slate-700">
                            <p>Per comparar dues variàncies poblacionals <Latex>{`\\sigma_1^2`}</Latex> i <Latex>{`\\sigma_2^2`}</Latex>, utilitzem la distribució F.</p>
                            <p>L'interval de confiança per al quocient <Latex>{`\\sigma_1^2 / \\sigma_2^2`}</Latex> és:</p>
                            <div className="bg-slate-100 p-3 rounded text-center"><Latex>{`\\left( \\frac{s_1^2}{s_2^2} \\cdot \\frac{1}{F_{\\alpha/2, n_1-1, n_2-1}}, \\ \\frac{s_1^2}{s_2^2} \\cdot F_{\\alpha/2, n_2-1, n_1-1} \\right)`}</Latex></div>
                            <p className="text-sm text-slate-500 italic mt-2">Nota: El càlcul exacte requereix taules F inverses complexes.</p>
                        </div>
                    );
                }
            };

            const renderBinomial = () => {
                const data = []; for(let k=0; k<=biN; k++) data.push({ k, p: binomialPMF(biN, biP, k) });
                const maxP = Math.max(...data.map(d=>d.p));
                const probExact = binomialPMF(biN, biP, biK); const probCum = data.filter(d=>d.k<=biK).reduce((s,d)=>s+d.p,0);
                
                const z = getZScore(confLevel);
                const pErr = z * Math.sqrt((biP * (1-biP))/biN);
                const ciLow = Math.max(0, biP - pErr); const ciHigh = Math.min(1, biP + pErr);

                return (
                    <div className="h-full flex flex-col gap-6">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                <div className="flex justify-between items-center border-b pb-2 mb-3"><h4 className="font-bold text-indigo-700 uppercase text-sm">Paràmetres</h4><div className="flex gap-2"><input type="file" ref={fileRef} onChange={handleFile} className="hidden"/><button onClick={()=>fileRef.current.click()} className="text-xs bg-indigo-50 text-indigo-700 px-2 py-1 rounded border border-indigo-200"><Icon path={icons.upload} size={12}/> CSV</button></div></div>
                                <div className="flex gap-4 items-end flex-wrap mb-4">
                                    <label className="text-xs font-bold uppercase text-slate-500">N <input type="number" value={biN} onChange={e=>setBiN(Number(e.target.value))} className="w-16 border border-slate-300 rounded p-1.5 ml-1 text-slate-700 font-mono"/></label>
                                    <label className="text-xs font-bold uppercase text-slate-500">P <input type="number" step="0.1" max="1" min="0" value={biP} onChange={e=>setBiP(Number(e.target.value))} className="w-16 border border-slate-300 rounded p-1.5 ml-1 text-slate-700 font-mono"/></label>
                                    <label className="text-xs font-bold uppercase text-slate-500">k <input type="number" max={biN} min="0" value={biK} onChange={e=>setBiK(Number(e.target.value))} className="w-16 border border-slate-300 rounded p-1.5 ml-1 text-slate-700 font-mono"/></label>
                                </div>
                                <div className="text-sm bg-slate-50 p-3 rounded border border-slate-200"><Latex>{`P(X=${biK}) = ${probExact.toFixed(4)}, \\quad P(X\\le${biK}) = ${probCum.toFixed(4)}`}</Latex></div>
                            </div>
                            
                            <div className="bg-emerald-50 p-6 rounded-xl border border-emerald-200 text-center relative shadow-sm flex flex-col justify-center">
                                <div className="flex justify-between items-center mb-3 border-b border-emerald-200/50 pb-2">
                                    <span className="font-bold text-lg text-emerald-800">Interval de Confiança (Proporció)</span>
                                    <button onClick={()=>setProcedureType('binomial')} className="text-emerald-700 hover:text-emerald-900 bg-white p-1.5 rounded-lg border border-emerald-200 shadow-sm transition-colors"><Icon path={icons.list} size={20}/></button>
                                </div>
                                <div className="flex justify-center items-center gap-2 mb-3">
                                    <span className="text-xs font-bold text-emerald-700 uppercase">Nivell:</span>
                                    <select value={confLevel} onChange={e=>setConfLevel(Number(e.target.value))} className="text-sm border border-emerald-300 rounded p-1 bg-white text-emerald-900 font-bold outline-none"><option value="90">90%</option><option value="95">95%</option><option value="99">99%</option></select>
                                </div>
                                <div className="text-3xl font-bold text-emerald-900 font-mono tracking-tight my-1"><Latex>{`(${ciLow.toFixed(3)}, ${ciHigh.toFixed(3)})`}</Latex></div>
                                <div className="text-xs text-emerald-600 mt-2 font-medium bg-white/50 inline-block px-2 py-1 rounded border border-emerald-100 self-center"><Latex>{`Marge d'Error E = ${pErr.toFixed(3)}`}</Latex></div>
                            </div>
                        </div>
                        
                        <div className="bg-white border border-slate-200 rounded-xl relative flex flex-col overflow-hidden h-[360px]">
                            <div className="absolute top-3 right-3 flex gap-1 bg-white/90 p-1.5 rounded-lg z-10 border shadow-sm">
                                <button onClick={()=>setShowGrid(!showGrid)} className={`p-1.5 rounded ${showGrid?'bg-indigo-100 text-indigo-700':'text-slate-400 hover:bg-slate-50'}`}><Icon path={icons.grid} size={16}/></button>
                                <button onClick={()=>setShowScale(!showScale)} className={`p-1.5 rounded ${showScale?'bg-indigo-100 text-indigo-700':'text-slate-400 hover:bg-slate-50'}`}><Icon path={icons.ruler} size={16}/></button>
                            </div>
                            <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-full" preserveAspectRatio="none">
                                {showGrid && <rect x={p} y={p} width={w-2*p} height={h-2*p} fill="url(#gridBi)" opacity="0.5"/>}
                                <line x1={p} y1={h-p} x2={w-p} y2={h-p} stroke="#334155" strokeWidth="2"/>
                                {data.map(d => { const x=p+(d.k/biN)*(w-2*p), barH=(d.p/maxP)*(h-2*p); return <rect key={d.k} x={x-5} y={h-p-barH} width={10} height={barH} fill={d.k===biK?"#f43f5e":"#6366f1"} opacity="0.8"/> })}
                                {showScale && <g><text x={p} y={h-p+15} textAnchor="middle" className="text-xs font-bold fill-slate-500">0</text><text x={w-p} y={h-p+15} textAnchor="middle" className="text-xs font-bold fill-slate-500">{biN}</text></g>}
                            </svg>
                        </div>
                    </div>
                );
            };

            const renderContinuous = () => {
                let pts=[], start=0, end=20, pdfFunc=null, maxY=0;
                if(type === 'normal') { start = mu - 4*sigma; end = mu + 4*sigma; pdfFunc = x => (1/(sigma*Math.sqrt(2*Math.PI))) * Math.exp(-0.5*Math.pow((x-mu)/sigma, 2)); }
                else if (type === 'chi') { start = 0; end = chiK * 3 + 5; pdfFunc = x => chiSquarePDF(x, chiK); }
                else if (type === 'f') { start = 0; end = 5; pdfFunc = x => fDistPDF(x, df1, df2); }
                
                for(let x=start; x<=end; x+=(end-start)/100) { const y=pdfFunc(x); pts.push({x, y}); if(y>maxY) maxY=y; }
                const mapX=x=>p+((x-start)/(end-start))*(w-2*p), mapY=y=>(h-p)-(y/maxY)*(h-2*p);
                const dPath=`M ${mapX(pts[0].x)} ${mapY(pts[0].y)} `+pts.map(pt=>`L ${mapX(pt.x)} ${mapY(pt.y)}`).join(' ');
                
                let probVal = 0;
                if(type === 'normal') probVal = normalCDF(normX, mu, sigma);
                else probVal = integrate(pdfFunc, 0, chiX, 200);

                // CI Normal
                const z = getZScore(confLevel);
                const stdErr = sigma / Math.sqrt(sampleN); 
                const error = z * stdErr;
                const ciLower = sampleMean - error; const ciUpper = sampleMean + error;

                // CI Chi
                const df = chiSampleN - 1;
                const alpha = (100 - chiConfLevel)/100;
                const chiLowerC = getChi2Crit(alpha/2, df);
                const chiUpperC = getChi2Crit(1-alpha/2, df);
                const varLower = (df * sampleVar) / chiUpperC;
                const varUpper = (df * sampleVar) / chiLowerC;

                return (
                    <div className="h-full grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-12 grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-4">
                                <div className="flex justify-between items-center border-b pb-2"><h4 className="font-bold text-indigo-700 uppercase text-sm">Paràmetres</h4><div className="flex gap-2"><input type="file" ref={fileRef} onChange={handleFile} className="hidden"/><button onClick={()=>fileRef.current.click()} className="text-xs bg-indigo-50 text-indigo-700 px-2 py-1 rounded border border-indigo-200"><Icon path={icons.upload} size={12}/> CSV</button></div></div>
                                <div className="flex gap-4 items-end flex-wrap">
                                    {type==='normal' && <><label className="text-xs font-bold uppercase text-slate-500"><Latex>{"\\mu"}</Latex> <input type="number" value={mu} onChange={e=>setMu(Number(e.target.value))} className="w-14 border border-slate-300 rounded p-1.5 ml-1 text-slate-700 font-mono"/></label><label className="text-xs font-bold uppercase text-slate-500"><Latex>{"\\sigma"}</Latex> <input type="number" min="0.1" step="0.1" value={sigma} onChange={e=>setSigma(Number(e.target.value))} className="w-14 border border-slate-300 rounded p-1.5 ml-1 text-slate-700 font-mono"/></label></>}
                                    {type==='chi' && <label className="text-xs font-bold uppercase text-slate-500">df <input type="number" value={chiK} onChange={e=>setChiK(Number(e.target.value))} className="w-14 border border-slate-300 rounded p-1.5 ml-1 text-slate-700 font-mono"/></label>}
                                    {type==='f' && <><label className="text-xs font-bold uppercase text-slate-500">d1 <input type="number" value={df1} onChange={e=>setDf1(Number(e.target.value))} className="w-14 border border-slate-300 rounded p-1.5 ml-1 text-slate-700 font-mono"/></label><label className="text-xs font-bold uppercase text-slate-500">d2 <input type="number" value={df2} onChange={e=>setDf2(Number(e.target.value))} className="w-14 border border-slate-300 rounded p-1.5 ml-1 text-slate-700 font-mono"/></label></>}
                                </div>
                                {(type === 'normal' || type === 'chi') && (
                                    <div className="text-sm bg-slate-50 p-3 rounded border border-slate-200 flex items-center gap-2">
                                        <span className="font-bold text-slate-600"><Latex>{`P(X \\le`}</Latex> <input type="number" value={type==='normal'?normX:chiX} onChange={e=>type==='normal'?setNormX(Number(e.target.value)):setChiX(Number(e.target.value))} className="w-12 border rounded p-1 text-center bg-white"/>{`) = `}</span>
                                        <span className="font-mono font-bold text-indigo-700 text-lg">{probVal.toFixed(4)}</span>
                                    </div>
                                )}
                            </div>
                            
                            {/* ENLARGED CI BOXES */}
                            {type === 'normal' && (
                                <div className="bg-emerald-50 p-6 rounded-xl border border-emerald-200 text-center relative shadow-sm flex flex-col justify-center">
                                    <div className="flex justify-between items-center mb-3 border-b border-emerald-200/50 pb-2">
                                        <span className="font-bold text-lg text-emerald-800">IC Mitjana <Latex>{`(\\mu)`}</Latex></span>
                                        <div className="flex gap-2">
                                            <select value={confLevel} onChange={e=>setConfLevel(Number(e.target.value))} className="text-sm border border-emerald-300 rounded p-1 bg-white text-emerald-900 font-bold outline-none"><option value="90">90%</option><option value="95">95%</option><option value="99">99%</option></select>
                                            <button onClick={()=>setProcedureType('normal')} className="text-emerald-700 hover:text-emerald-900 bg-white p-1.5 rounded-lg border border-emerald-200 shadow-sm transition-colors"><Icon path={icons.list} size={20}/></button>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 items-center text-sm justify-center mb-3">
                                        <label className="font-mono text-emerald-700 font-bold">n:<input type="number" value={sampleN} onChange={e=>setSampleN(Number(e.target.value))} className="w-12 border border-emerald-300 rounded text-center ml-1 bg-white"/></label>
                                        <label className="font-mono text-emerald-700 font-bold"><Latex>{`\\bar{x}:`}</Latex><input type="number" value={sampleMean} onChange={e=>setSampleMean(Number(e.target.value))} className="w-14 border border-emerald-300 rounded text-center ml-1 bg-white"/></label>
                                    </div>
                                    <div className="text-3xl font-bold text-emerald-900 font-mono tracking-tight"><Latex>{`(${ciLower.toFixed(2)}, ${ciUpper.toFixed(2)})`}</Latex></div>
                                </div>
                            )}

                            {type === 'chi' && (
                                <div className="bg-emerald-50 p-6 rounded-xl border border-emerald-200 text-center relative shadow-sm flex flex-col justify-center">
                                    <div className="flex justify-between items-center mb-3 border-b border-emerald-200/50 pb-2">
                                        <span className="font-bold text-lg text-emerald-800">IC Variància <Latex>{`(\\sigma^2)`}</Latex></span>
                                        <div className="flex gap-2">
                                            <select value={chiConfLevel} onChange={e=>setChiConfLevel(Number(e.target.value))} className="text-sm border border-emerald-300 rounded p-1 bg-white text-emerald-900 font-bold outline-none"><option value="90">90%</option><option value="95">95%</option><option value="99">99%</option></select>
                                            <button onClick={()=>setProcedureType('chi')} className="text-emerald-700 hover:text-emerald-900 bg-white p-1.5 rounded-lg border border-emerald-200 shadow-sm transition-colors"><Icon path={icons.list} size={20}/></button>
                                        </div>
                                    </div>
                                    <div className="flex gap-4 items-center text-sm justify-center mb-3">
                                        <label className="font-mono text-emerald-700 font-bold">n:<input type="number" value={chiSampleN} onChange={e=>setChiSampleN(Number(e.target.value))} className="w-12 border border-emerald-300 rounded text-center ml-1 bg-white"/></label>
                                        <label className="font-mono text-emerald-700 font-bold"><Latex>{`s^2:`}</Latex><input type="number" value={sampleVar} onChange={e=>setSampleVar(Number(e.target.value))} className="w-14 border border-emerald-300 rounded text-center ml-1 bg-white"/></label>
                                    </div>
                                    <div className="text-3xl font-bold text-emerald-900 font-mono tracking-tight"><Latex>{`(${varLower.toFixed(2)}, ${varUpper.toFixed(2)})`}</Latex></div>
                                </div>
                            )}
                            
                            {type === 'f' && <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 flex items-center justify-center h-full"><button onClick={()=>setProcedureType('f')} className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-300 rounded-lg shadow-sm hover:bg-slate-50 font-bold text-slate-700 transition-all"><Icon path={icons.list} size={20}/> Veure Procediment IC Comparació</button></div>}
                        </div>
                        
                        <div className="lg:col-span-12 bg-white border border-slate-200 rounded-xl relative flex flex-col h-[360px] overflow-hidden shadow-sm">
                            <div className="absolute top-3 right-3 flex gap-1 bg-white/90 p-1.5 rounded-lg z-10 border shadow-sm">
                                <button onClick={()=>setShowGrid(!showGrid)} className={`p-1.5 rounded ${showGrid?'bg-indigo-100 text-indigo-700':'text-slate-400 hover:bg-slate-50'}`}><Icon path={icons.grid} size={16}/></button>
                                <button onClick={()=>setShowScale(!showScale)} className={`p-1.5 rounded ${showScale?'bg-indigo-100 text-indigo-700':'text-slate-400 hover:bg-slate-50'}`}><Icon path={icons.ruler} size={16}/></button>
                            </div>
                            <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-full" preserveAspectRatio="none">
                                {showGrid && <line x1={p} y1={h-p} x2={w-p} y2={h-p} stroke="#e2e8f0" strokeWidth="1"/>}
                                {(() => {
                                    const areaPts = pts.filter(pt => pt.x <= (type==='normal'?normX:chiX));
                                    if(areaPts.length>0) {
                                        const dArea = `M ${mapX(areaPts[0].x)} ${h-p} `+areaPts.map(pt=>`L ${mapX(pt.x)} ${mapY(pt.y)}`).join(' ')+` L ${mapX(areaPts[areaPts.length-1].x)} ${h-p} Z`;
                                        return <path d={dArea} fill="#6366f1" fillOpacity="0.3" stroke="none"/>;
                                    }
                                })()}
                                <path d={dPath} fill="none" stroke="#6366f1" strokeWidth="2"/>
                                {showScale && <line x1={p} y1={h-p} x2={w-p} y2={h-p} stroke="#334155"/>}
                                {showScale && [0,0.25,0.5,0.75,1].map(f => {
                                    const val = start + f*(end-start);
                                    return <text key={f} x={mapX(val)} y={h-p+15} textAnchor="middle" className="text-[10px] font-bold fill-slate-500">{val.toFixed(1)}</text>
                                })}
                            </svg>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-full flex flex-col gap-4">
                    <Modal isOpen={showAnalysis} onClose={()=>setShowAnalysis(false)} title="Anàlisi de Distribució">{analysisText}</Modal>
                    <Modal isOpen={!!procedureType} onClose={()=>setProcedureType(null)} title="Procediment Pas a Pas">{getProcedureText()}</Modal>
                    
                    <div className="flex gap-2 justify-center bg-white p-2 rounded-xl shadow-sm border border-slate-200 w-fit mx-auto flex-wrap">
                        <button onClick={()=>setType('normal')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-all ${type==='normal'?'bg-indigo-600 text-white shadow-md':'text-slate-500 hover:bg-slate-50'}`}>Normal</button>
                        <button onClick={()=>setType('binomial')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-all ${type==='binomial'?'bg-emerald-600 text-white shadow-md':'text-slate-500 hover:bg-slate-50'}`}>Binomial</button>
                        <button onClick={()=>setType('chi')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-all ${type==='chi'?'bg-orange-600 text-white shadow-md':'text-slate-500 hover:bg-slate-50'}`}>Khi²</button>
                        <button onClick={()=>setType('f')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-all ${type==='f'?'bg-rose-600 text-white shadow-md':'text-slate-500 hover:bg-slate-50'}`}>F-Snedecor</button>
                        <button onClick={()=>setShowAnalysis(true)} className="px-4 py-1.5 rounded-lg text-sm font-bold bg-slate-800 text-white ml-2 hover:bg-slate-900 transition-colors shadow-md">Anàlisi</button>
                    </div>
                    <div className="flex-1 bg-slate-50 border border-slate-200 rounded-xl p-6 overflow-y-auto custom-scrollbar">
                        {type==='binomial' ? renderBinomial() : renderContinuous()}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [tab, setTab] = useState('1d');
            return (
                <div className="min-h-screen font-sans text-slate-900 bg-slate-50 flex flex-col pb-10">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm flex-none">
                        <div className="w-[98%] mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-600 p-2 rounded-lg text-white"><Icon path={icons.barChart} size={24} /></div>
                                <div><h1 className="text-xl font-bold text-slate-800 tracking-tight">Laboratori d'Estadística</h1><p className="text-xs text-slate-500 font-medium uppercase tracking-wide">Matemàtiques 1r Batxillerat</p></div>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                                <button onClick={() => setTab('1d')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all ${tab === '1d' ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Icon path={icons.barChart} size={16} /> Unidimensional</button>
                                <button onClick={() => setTab('2d')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all ${tab === '2d' ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Icon path={icons.scatter} size={16} /> Bidimensional</button>
                                <button onClick={() => setTab('dist')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all ${tab === 'dist' ? 'bg-white text-rose-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Icon path={icons.bell} size={16} /> Distribucions</button>
                                <button onClick={() => setTab('formula')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all ${tab === 'formula' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Icon path={icons.formula} size={16} /> Fórmules</button>
                            </div>
                        </div>
                    </header>
                    <main className="flex-1 w-[98%] mx-auto mt-6 animate-in fade-in duration-300 h-full pb-6">
                        {tab === '1d' ? <Stats1D /> : tab === '2d' ? <Stats2D /> : tab === 'dist' ? <Distributions /> : <Formulary />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
