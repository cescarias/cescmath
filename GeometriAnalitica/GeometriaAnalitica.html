<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometria Analítica de l'Espai (3D)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body { background-color: #f8fafc; overflow: hidden; }
        .katex { font-size: 1.0em; }
        .cursor-grab { cursor: grab; }
        .cursor-grabbing { cursor: grabbing; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONS ---
        const Icon = ({ path, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d={path} />
            </svg>
        );

        const icons = {
            vector: "M2 12h20M16 6l6 6-6 6",
            cube: "M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z M3.27 6.96L12 12.01l8.73-5.05 M12 22.08V12",
            ruler: "M2 12h20 M12 2v20",
            rotate: "M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8",
            layers: "M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5",
            book: "M4 19.5A2.5 2.5 0 0 1 6.5 17H20 M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z",
            analysis: "M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01",
            close: "M6 18L18 6M6 6l12 12",
            list: "M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"
        };

        // --- MATH ENGINE ---
        const add = (v1, v2) => ({ x: v1.x+v2.x, y: v1.y+v2.y, z: v1.z+v2.z });
        const sub = (v1, v2) => ({ x: v1.x-v2.x, y: v1.y-v2.y, z: v1.z-v2.z });
        const scale = (v, s) => ({ x: v.x*s, y: v.y*s, z: v.z*s });
        const dot = (v1, v2) => v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
        const cross = (a, b) => ({ x: a.y*b.z - a.z*b.y, y: a.z*b.x - a.x*b.z, z: a.x*b.y - a.y*b.x });
        const mod = (v) => Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z);
        const normalize = (v) => { const m = mod(v); return m===0 ? {x:0,y:0,z:0} : scale(v, 1/m); };
        
        // Matrix Rank & Determinants
        const det3x3 = (m) => {
             return m[0][0]*(m[1][1]*m[2][2] - m[1][2]*m[2][1]) -
                    m[0][1]*(m[1][0]*m[2][2] - m[1][2]*m[2][0]) +
                    m[0][2]*(m[1][0]*m[2][1] - m[1][1]*m[2][0]);
        };
        
        const getRank = (mat, rows, cols) => {
             let m = JSON.parse(JSON.stringify(mat)); 
             let rank = 0; let row = 0;
             for (let col = 0; col < cols && row < rows; col++) {
                 let pivot = row;
                 while(pivot < rows && Math.abs(m[pivot][col]) < 1e-9) pivot++;
                 if (pivot < rows) {
                     let temp = m[row]; m[row] = m[pivot]; m[pivot] = temp;
                     rank++;
                     let val = m[row][col];
                     for(let j=col; j<cols; j++) m[row][j] /= val;
                     for(let i=0; i<rows; i++) {
                         if (i !== row) {
                             let factor = m[i][col];
                             for(let j=col; j<cols; j++) m[i][j] -= factor * m[row][j];
                         }
                     }
                     row++;
                 }
             }
             return rank;
        };

        // --- EQUATION FORMATTERS ---
        const formatTerm = (coef, vari, isFirst) => {
            if (Math.abs(coef) < 1e-9) return "";
            let s = "";
            if (coef < 0) s += "- ";
            else if (!isFirst) s += "+ ";
            const absC = Math.abs(coef);
            if (Math.abs(absC - 1) < 1e-9 && vari) s += vari;
            else s += Number(absC.toFixed(2)) + (vari || "");
            return s;
        };

        const getPlaneEqTex = (P, N) => {
            const D = -(N.x*P.x + N.y*P.y + N.z*P.z);
            let eq = formatTerm(N.x, "x", true) + " " + formatTerm(N.y, "y", N.x===0) + " " + formatTerm(N.z, "z", N.x===0 && N.y===0);
            if (Math.abs(D) > 1e-9 || eq==="") eq += " " + formatTerm(D, "", eq==="");
            return eq + " = 0";
        };

        const getLineEqTex = (P, V, k="\\lambda") => {
            return `\\begin{cases} x = ${P.x} ${V.x>=0?'+':'-'} ${Math.abs(V.x)}${k} \\\\ y = ${P.y} ${V.y>=0?'+':'-'} ${Math.abs(V.y)}${k} \\\\ z = ${P.z} ${V.z>=0?'+':'-'} ${Math.abs(V.z)}${k} \\end{cases}`;
        };

        // --- COMPONENTS ---
        const Latex = ({ children, block = false }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.katex && containerRef.current) {
                    try {
                        let content = Array.isArray(children) ? children.join('') : String(children);
                        window.katex.render(content, containerRef.current, { throwOnError: false, displayMode: block });
                    } catch (e) { containerRef.current.innerText = String(children); }
                }
            }, [children, block]);
            return <span ref={containerRef} />;
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col animate-[fadeIn_0.2s_ease-out]">
                        <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 rounded-t-xl">
                            <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><Icon path={icons.analysis} /> {title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icon path={icons.close} /></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar text-slate-700 leading-relaxed text-sm">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // --- 3D RENDERER ---
        const rotatePoint = (p, rotX, rotZ) => {
            const radZ = rotZ * Math.PI / 180;
            const x1 = p.x * Math.cos(radZ) - p.y * Math.sin(radZ);
            const y1 = p.x * Math.sin(radZ) + p.y * Math.cos(radZ);
            const z1 = p.z;
            const radX = rotX * Math.PI / 180;
            const y2 = y1 * Math.cos(radX) - z1 * Math.sin(radX);
            const z2 = y1 * Math.sin(radX) + z1 * Math.cos(radX);
            return { x: x1, y: y2, z: z2 };
        };

        const project = (p, width, height, zoom) => {
            const scale = 20 * zoom;
            const cx = width / 2; const cy = height / 2;
            return { x: cx + p.x * scale, y: cy - p.z * scale }; 
        };

        const Scene3D = ({ objects, width, height }) => {
            const [rot, setRot] = useState({ x: -20, z: -45 });
            const [zoom, setZoom] = useState(1.2);
            const isDragging = useRef(false);
            const lastMouse = useRef({ x: 0, y: 0 });

            const handleMouseDown = e => { isDragging.current = true; lastMouse.current = { x: e.clientX, y: e.clientY }; };
            const handleMouseMove = e => {
                if (!isDragging.current) return;
                const dx = e.clientX - lastMouse.current.x;
                const dy = e.clientY - lastMouse.current.y;
                setRot(prev => ({ x: Math.max(-90, Math.min(90, prev.x + dy)), z: prev.z - dx }));
                lastMouse.current = { x: e.clientX, y: e.clientY };
            };
            const handleMouseUp = () => isDragging.current = false;

            const renderObjects = useMemo(() => {
                const els = [];
                const o={x:0,y:0,z:0}, x={x:8,y:0,z:0}, y={x:0,y:8,z:0}, z={x:0,y:0,z:8};
                const po=project(rotatePoint(o,rot.x,rot.z),width,height,zoom);
                const px=project(rotatePoint(x,rot.x,rot.z),width,height,zoom);
                const py=project(rotatePoint(y,rot.x,rot.z),width,height,zoom);
                const pz=project(rotatePoint(z,rot.x,rot.z),width,height,zoom);
                els.push(<g key="ax" className="pointer-events-none"><line x1={po.x} y1={po.y} x2={px.x} y2={px.y} stroke="#ef4444"/><text x={px.x} y={px.y} className="fill-red-500 text-xs font-bold">X</text><line x1={po.x} y1={po.y} x2={py.x} y2={py.y} stroke="#10b981"/><text x={py.x} y={py.y} className="fill-emerald-500 text-xs font-bold">Y</text><line x1={po.x} y1={po.y} x2={pz.x} y2={pz.y} stroke="#3b82f6"/><text x={pz.x} y={pz.y} className="fill-blue-500 text-xs font-bold">Z</text></g>);
                
                objects.forEach((obj, i) => {
                    const col = obj.color || '#333';
                    if(obj.type==='point') {
                        const p = project(rotatePoint(obj.pos,rot.x,rot.z),width,height,zoom);
                        els.push(<g key={i}><circle cx={p.x} cy={p.y} r="4" fill={col} stroke="white" strokeWidth="1"/>{obj.label && <text x={p.x+5} y={p.y-5} className="text-xs font-bold fill-slate-700">{obj.label}</text>}</g>);
                    } else if(obj.type==='vector' || obj.type==='line') {
                        const s = obj.start || (obj.point ? sub(obj.point, scale(normalize(obj.vec), 10)) : {x:0,y:0,z:0});
                        const e = obj.end || (obj.point ? add(obj.point, scale(normalize(obj.vec), 10)) : obj.vec);
                        const ps = project(rotatePoint(s,rot.x,rot.z),width,height,zoom);
                        const pe = project(rotatePoint(e,rot.x,rot.z),width,height,zoom);
                        els.push(<line key={i} x1={ps.x} y1={ps.y} x2={pe.x} y2={pe.y} stroke={col} strokeWidth={obj.type==='vector'?2.5:1.5} strokeDasharray={obj.dashed?"4,2":"0"} markerEnd={obj.type==='vector'?"url(#ah)":""}/>);
                        if(obj.type==='vector' && obj.label) {
                            els.push(<text key={`vl-${i}`} x={(ps.x+pe.x)/2} y={(ps.y+pe.y)/2} className="text-xs font-bold fill-slate-600">{obj.label}</text>);
                        }
                    } else if(obj.type==='plane') {
                        const N = normalize(obj.normal);
                        let u = Math.abs(dot(N, {x:1,y:0,z:0})) > 0.9 ? {x:0,y:1,z:0} : {x:1,y:0,z:0};
                        u = normalize(cross(N, u));
                        const v = normalize(cross(N, u));
                        const sz = 8;
                        const c1=add(obj.point, add(scale(u,sz), scale(v,sz))), c2=add(obj.point, add(scale(u,-sz), scale(v,sz)));
                        const c3=add(obj.point, add(scale(u,-sz), scale(v,-sz))), c4=add(obj.point, add(scale(u,sz), scale(v,-sz)));
                        const pc1=project(rotatePoint(c1,rot.x,rot.z),width,height,zoom), pc2=project(rotatePoint(c2,rot.x,rot.z),width,height,zoom);
                        const pc3=project(rotatePoint(c3,rot.x,rot.z),width,height,zoom), pc4=project(rotatePoint(c4,rot.x,rot.z),width,height,zoom);
                        els.push(<path key={i} d={`M${pc1.x},${pc1.y} L${pc2.x},${pc2.y} L${pc3.x},${pc3.y} L${pc4.x},${pc4.y} Z`} fill={col} fillOpacity="0.15" stroke={col} strokeWidth="0.5"/>);
                    }
                });
                return els;
            }, [objects, rot, zoom]);

            return (
                <div className="relative w-full h-full bg-slate-50 border rounded-xl overflow-hidden cursor-grab active:cursor-grabbing" onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}>
                    <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`}><defs><marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker></defs>{renderObjects}</svg>
                    <div className="absolute bottom-2 right-2 text-xs text-slate-400 bg-white/50 px-2 rounded">Arrossega per rotar</div>
                </div>
            );
        };

        // --- MODULE 1: VECTORS ---
        const VectorModule = () => {
            const [u, setU] = useState({x:2, y:1, z:0});
            const [v, setV] = useState({x:0, y:2, z:3});
            const [expl, setExpl] = useState(null);

            const dotProd = dot(u, v);
            const crossProd = cross(u, v);
            const modU = mod(u); const modV = mod(v);
            const angleRad = Math.acos(dotProd / (modU * modV));
            const angleDeg = (angleRad * 180 / Math.PI) || 0;
            const objects = [
                { type: 'vector', vec: u, color: '#3b82f6', label: 'u' }, 
                { type: 'vector', vec: v, color: '#ef4444', label: 'v' }, 
                { type: 'vector', vec: crossProd, color: '#10b981', label: 'u x v' }
            ];

            const showProcedure = () => {
                setExpl(
                    <div className="space-y-6">
                        <div>
                            <h4 className="font-bold text-slate-800 border-b pb-1 mb-2">1. Producte Escalar (Dot Product)</h4>
                            <p className="mb-2">El producte escalar dóna com a resultat un número (escalar) i es relaciona amb l'angle entre vectors.</p>
                            <div className="bg-slate-50 p-3 rounded font-mono text-sm mb-2"><Latex block>{`\\vec{u} \\cdot \\vec{v} = x_1x_2 + y_1y_2 + z_1z_2`}</Latex></div>
                            <div className="pl-4 border-l-2 border-slate-200 font-mono text-sm">
                                <Latex>{`= (${u.x})(${v.x}) + (${u.y})(${v.y}) + (${u.z})(${v.z})`}</Latex><br/>
                                <Latex>{`= ${u.x*v.x} + ${u.y*v.y} + ${u.z*v.z} = \\mathbf{${dotProd}}`}</Latex>
                            </div>
                        </div>
                        <div>
                            <h4 className="font-bold text-slate-800 border-b pb-1 mb-2">2. Producte Vectorial (Cross Product)</h4>
                            <p className="mb-2">El resultat és un vector perpendicular a <Latex>{`\\vec{u}`}</Latex> i <Latex>{`\\vec{v}`}</Latex>. Es calcula amb el determinant:</p>
                            <div className="bg-slate-50 p-3 rounded font-mono text-sm mb-2 text-center">
                                <Latex>{`\\begin{vmatrix} \\mathbf{i} & \\mathbf{j} & \\mathbf{k} \\\\ ${u.x} & ${u.y} & ${u.z} \\\\ ${v.x} & ${v.y} & ${v.z} \\end{vmatrix}`}</Latex>
                            </div>
                            <p>Desenvolupant per la primera fila (Sarrus):</p>
                            <ul className="list-disc pl-5 space-y-1 font-mono text-sm">
                                <li><Latex>{`x: (${u.y})(${v.z}) - (${u.z})(${v.y}) = ${u.y*v.z} - ${u.z*v.y} = ${u.y*v.z - u.z*v.y}`}</Latex></li>
                                <li><Latex>{`y: -[(${u.x})(${v.z}) - (${u.z})(${v.x})] = -[${u.x*v.z} - ${u.z*v.x}] = ${-(u.x*v.z - u.z*v.x)}`}</Latex></li>
                                <li><Latex>{`z: (${u.x})(${v.y}) - (${u.y})(${v.x}) = ${u.x*v.y} - ${u.y*v.x} = ${u.x*v.y - u.y*v.x}`}</Latex></li>
                            </ul>
                            <p className="mt-2 font-bold text-emerald-700">Resultat: <Latex>{`\\vec{u} \\times \\vec{v} = (${crossProd.x}, ${crossProd.y}, ${crossProd.z})`}</Latex></p>
                        </div>
                    </div>
                );
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
                    <Modal isOpen={!!expl} onClose={()=>setExpl(null)} title="Procediment Operacions Vectors">{expl}</Modal>
                    <div className="lg:col-span-4 bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-4 overflow-y-auto">
                        <h3 className="font-bold text-indigo-800 uppercase text-sm border-b pb-2">Vectors</h3>
                        <div className="space-y-4">
                            <div><label className="text-xs font-bold text-blue-600 block mb-1">Vector u</label><div className="flex gap-2"><input type="number" value={u.x} onChange={e=>setU({...u, x:Number(e.target.value)})} className="w-full border rounded p-1 text-center font-mono"/><input type="number" value={u.y} onChange={e=>setU({...u, y:Number(e.target.value)})} className="w-full border rounded p-1 text-center font-mono"/><input type="number" value={u.z} onChange={e=>setU({...u, z:Number(e.target.value)})} className="w-full border rounded p-1 text-center font-mono"/></div></div>
                            <div><label className="text-xs font-bold text-red-600 block mb-1">Vector v</label><div className="flex gap-2"><input type="number" value={v.x} onChange={e=>setV({...v, x:Number(e.target.value)})} className="w-full border rounded p-1 text-center font-mono"/><input type="number" value={v.y} onChange={e=>setV({...v, y:Number(e.target.value)})} className="w-full border rounded p-1 text-center font-mono"/><input type="number" value={v.z} onChange={e=>setV({...v, z:Number(e.target.value)})} className="w-full border rounded p-1 text-center font-mono"/></div></div>
                            <button onClick={showProcedure} className="w-full py-2 bg-indigo-600 text-white rounded font-bold text-xs hover:bg-indigo-700 flex items-center justify-center gap-2"><Icon path={icons.list} size={14}/> Veure Procediment</button>
                        </div>
                        <div className="bg-slate-50 p-4 rounded-lg border border-slate-100 text-sm space-y-3">
                            <div className="flex justify-between"><span>Escalar <Latex>{"\\vec{u}\\cdot\\vec{v}"}</Latex></span> <span className="font-mono font-bold">{dotProd}</span></div>
                            <div><span className="block mb-1">Vectorial <Latex>{"\\vec{u}\\times\\vec{v}"}</Latex></span> <span className="font-mono font-bold text-emerald-600 block text-center bg-white border rounded p-1">({crossProd.x}, {crossProd.y}, {crossProd.z})</span></div>
                            <div className="flex justify-between"><span>Mòdul |u|</span> <span className="font-mono">{modU.toFixed(2)}</span></div>
                            <div className="flex justify-between"><span>Mòdul |v|</span> <span className="font-mono">{modV.toFixed(2)}</span></div>
                            <div className="flex justify-between border-t pt-2 mt-2"><span>Angle</span> <span className="font-bold">{angleDeg.toFixed(2)}°</span></div>
                        </div>
                    </div>
                    <div className="lg:col-span-8 h-[500px] lg:h-auto"><Scene3D objects={objects} width={800} height={600} /></div>
                </div>
            );
        };

        // --- MODULE 2: POSITIONS ---
        const PositionsModule = () => {
            const [mode, setMode] = useState('lines');
            const [expl, setExpl] = useState(null);
            
            // Elements
            const [rP, setRP] = useState({x:1,y:2,z:3}); const [rV, setRV] = useState({x:1,y:0,z:-1}); // Line 1
            const [sP, setSP] = useState({x:0,y:1,z:0}); const [sV, setSV] = useState({x:2,y:1,z:1}); // Line 2
            const [plP, setPlP] = useState({x:0,y:0,z:0}); const [plN, setPlN] = useState({x:0,y:0,z:1}); // Plane 1
            const [pl2P, setPl2P] = useState({x:0,y:0,z:2}); const [pl2N, setPl2N] = useState({x:0,y:0,z:1}); // Plane 2
            const [pl3P, setPl3P] = useState({x:1,y:0,z:0}); const [pl3N, setPl3N] = useState({x:1,y:0,z:0}); // Plane 3

            let status = "", procedure = null;
            let objects = [];
            let eqText = "";

            if (mode === 'lines') {
                const vecPP = sub(sP, rP);
                const cp = cross(rV, sV);
                const mix = dot(vecPP, cp);
                const rankM = mod(cp) > 1e-5 ? 2 : 1;
                const rankM_amp = Math.abs(mix) > 1e-5 ? 3 : (rankM === 2 ? 2 : (mod(cross(rV, vecPP)) > 1e-5 ? 2 : 1));
                
                if (rankM === 1 && rankM_amp === 1) status = "Coincidents";
                else if (rankM === 1 && rankM_amp === 2) status = "Paral·leles";
                else if (rankM === 2 && rankM_amp === 2) status = "Secants (es tallen en un punt)";
                else status = "Es creuen (no es toquen)";

                eqText = <div className="space-y-1"><Latex block>{`r: ` + getLineEqTex(rP, rV)}</Latex><Latex block>{`s: ` + getLineEqTex(sP, sV, "\\mu")}</Latex></div>;

                procedure = (
                    <div className="space-y-4">
                        <p>1. Construïm la matriu de vectors directors $M$ i l'ampliada $M'$ amb el vector <Latex>{"\\vec{AB}"}</Latex>.</p>
                        <div className="bg-slate-50 p-3 rounded font-mono text-xs text-center">
                             <Latex block>{`M = \\begin{pmatrix} ${rV.x} & ${sV.x} \\\\ ${rV.y} & ${sV.y} \\\\ ${rV.z} & ${sV.z} \\end{pmatrix}, \\quad M' = \\begin{pmatrix} ${rV.x} & ${sV.x} & ${vecPP.x} \\\\ ${rV.y} & ${sV.y} & ${vecPP.y} \\\\ ${rV.z} & ${sV.z} & ${vecPP.z} \\end{pmatrix}`}</Latex>
                        </div>
                        <p>2. Calculem els rangs:</p>
                        <ul className="list-disc pl-5">
                            <li><Latex>{`\\vec{u} \\times \\vec{v} = (${cp.x}, ${cp.y}, ${cp.z})`}</Latex>. {rankM===2 ? "No nul $\\Rightarrow$ Rang(M)=2" : "Nul $\\Rightarrow$ Rang(M)=1"}</li>
                            <li><Latex>{`\\det(M') = [\\vec{u}, \\vec{v}, \\vec{AB}] = ${mix.toFixed(2)}`}</Latex>. {rankM_amp===3 ? "No nul $\\Rightarrow$ Rang(M')=3" : `Nul $\\Rightarrow$ Rang(M')=${rankM_amp}`}</li>
                        </ul>
                        <p className="font-bold text-indigo-700">Com que Rang(M)={rankM} i Rang(M')={rankM_amp} $\Rightarrow$ {status}</p>
                    </div>
                );
                objects = [{ type:'line', point:rP, vec:rV, color:'#3b82f6', label:'r' }, { type:'line', point:sP, vec:sV, color:'#ef4444', label:'s' }];
            } else if (mode === 'lineplane') {
                const dotProd = dot(rV, plN);
                const isPerp = Math.abs(dotProd) < 0.01;
                const D = -dot(plN, plP);
                const val = dot(plN, rP) + D;
                
                if (isPerp) {
                    if (Math.abs(val) < 0.01) status = "Recta Continguda al Pla";
                    else status = "Recta Paral·lela al Pla";
                } else {
                    status = "Recta Secant al Pla";
                }
                
                eqText = <div className="space-y-1"><Latex block>{`r: ` + getLineEqTex(rP, rV)}</Latex><Latex block>{`\\pi: ` + getPlaneEqTex(plP, plN)}</Latex></div>;

                procedure = (
                     <div className="space-y-4">
                        <p>1. Estudiem el producte escalar entre el vector director de la recta $\vec{v}$ i el normal del pla $\vec{n}$.</p>
                        <div className="bg-slate-50 p-2 rounded text-center"><Latex>{`\\vec{v} \\cdot \\vec{n} = ${rV.x}\\cdot${plN.x} + ${rV.y}\\cdot${plN.y} + ${rV.z}\\cdot${plN.z} = ${dotProd}`}</Latex></div>
                        <p>2. Interpretació:</p>
                        <ul className="list-disc pl-5">
                            {isPerp ? <li>El producte és 0: Els vectors són perpendiculars, per tant la recta és paral·lela o continguda.</li> : <li>El producte no és 0: Els vectors no són perpendiculars, la recta talla el pla.</li>}
                            {isPerp && (Math.abs(val)<0.01 ? <li>El punt $P_r$ verifica l'equació del pla ($0=0$). <strong>Continguda</strong>.</li> : <li>El punt $P_r$ no verifica l'equació. <strong>Paral·lela</strong>.</li>)}
                        </ul>
                     </div>
                );
                objects = [{ type:'line', point:rP, vec:rV, color:'#3b82f6', label:'r' }, { type:'plane', point:plP, normal:plN, color:'#10b981' }];
            } else if (mode === 'planes') {
                const cp = cross(plN, pl2N);
                const rankM = mod(cp) > 0.01 ? 2 : 1;
                let rankMA = 0;
                const D1 = -dot(plN, plP); const D2 = -dot(pl2N, pl2P);
                if (rankM === 2) {
                    status = "Plans Secants"; rankMA = 2;
                } else {
                    const val = dot(pl2N, plP) + D2;
                    if (Math.abs(val) < 0.01) { status = "Plans Coincidents"; rankMA=1; }
                    else { status = "Plans Paral·lels"; rankMA=2; }
                }

                eqText = <div className="space-y-1"><Latex block>{`\\pi_1: ` + getPlaneEqTex(plP, plN)}</Latex><Latex block>{`\\pi_2: ` + getPlaneEqTex(pl2P, pl2N)}</Latex></div>;

                procedure = (
                    <div className="space-y-4">
                        <p>Analitzem la matriu de coeficients (normals) $M$ i l'ampliada $M'$.</p>
                        <div className="bg-slate-50 p-2 rounded text-center font-mono text-xs">
                             <Latex block>{`M = \\begin{pmatrix} ${plN.x} & ${plN.y} & ${plN.z} \\\\ ${pl2N.x} & ${pl2N.y} & ${pl2N.z} \\end{pmatrix}`}</Latex>
                        </div>
                        <ul className="list-disc pl-5">
                            <li><Latex>{`\\text{Rang}(M) = ${rankM}`}</Latex> {rankM===2?"(Normals no paral·lels)":"(Normals paral·lels)"}</li>
                            {rankM===1 && <li>Comprovem si $D_1$ i $D_2$ mantenen la proporció (o si un punt de $\pi_1$ compleix $\pi_2$). <Latex>{`\\text{Rang}(M') = ${rankMA}`}</Latex>.</li>}
                        </ul>
                        <p className="font-bold text-indigo-700">Conclusió: {status}</p>
                    </div>
                );
                objects = [{ type:'plane', point:plP, normal:plN, color:'#10b981' }, { type:'plane', point:pl2P, normal:pl2N, color:'#f59e0b' }];
            } else if (mode === '3planes') {
                const D1 = -dot(plN, plP); const D2 = -dot(pl2N, pl2P); const D3 = -dot(pl3N, pl3P);
                const matM = [[plN.x,plN.y,plN.z], [pl2N.x,pl2N.y,pl2N.z], [pl3N.x,pl3N.y,pl3N.z]];
                const matMA = [[plN.x,plN.y,plN.z,-D1], [pl2N.x,pl2N.y,pl2N.z,-D2], [pl3N.x,pl3N.y,pl3N.z,-D3]];
                const rankM = getRank(matM, 3, 3);
                const rankMA = getRank(matMA, 3, 4);

                if (rankM===3 && rankMA===3) status = "Triedre (Es tallen en un punt)";
                else if (rankM===2 && rankMA===3) status = "Prisma (Es tallen dos a dos)";
                else if (rankM===2 && rankMA===2) status = "Fascicle (Es tallen en una recta)";
                else if (rankM===1 && rankMA===2) status = "Plans Paral·lels";
                else if (rankM===1 && rankMA===1) status = "Plans Coincidents";
                
                eqText = <div className="space-y-1"><Latex block>{`\\pi_1: ` + getPlaneEqTex(plP, plN)}</Latex><Latex block>{`\\pi_2: ` + getPlaneEqTex(pl2P, pl2N)}</Latex><Latex block>{`\\pi_3: ` + getPlaneEqTex(pl3P, pl3N)}</Latex></div>;

                procedure = (
                    <div className="space-y-4">
                        <p>Estudiem el sistema de 3 equacions lineals amb Rouché-Frobenius.</p>
                        <div className="bg-slate-50 p-2 rounded text-center text-xs">
                             <Latex block>{`\\det(M) = ${det3x3(matM).toFixed(2)}`}</Latex>
                        </div>
                        <ul className="list-disc pl-5">
                            <li>Rang(M) = {rankM}</li>
                            <li>Rang(M') = {rankMA}</li>
                        </ul>
                        <p className="font-bold text-indigo-700">Interpretació: {status}</p>
                    </div>
                );

                objects = [
                    { type:'plane', point:plP, normal:plN, color:'#10b981' }, 
                    { type:'plane', point:pl2P, normal:pl2N, color:'#f59e0b' },
                    { type:'plane', point:pl3P, normal:pl3N, color:'#6366f1' }
                ];
            }

            const showExplanation = () => {
                setExpl(
                    <div className="space-y-4">
                        <h4 className="font-bold text-indigo-800 border-b pb-1">Anàlisi de Rangs (Rouché-Frobenius)</h4>
                        <div className="border-t pt-2 mt-2 text-sm text-slate-600">
                             {procedure}
                        </div>
                    </div>
                );
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
                    <Modal isOpen={!!expl} onClose={()=>setExpl(null)} title="Raonament Analític">{expl}</Modal>
                    <div className="lg:col-span-4 bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-4">
                        <div className="flex justify-between items-center border-b pb-2"><h3 className="font-bold text-indigo-800 uppercase text-sm">Posicions Relatives</h3><select value={mode} onChange={e=>setMode(e.target.value)} className="text-sm border rounded p-1"><option value="lines">Recta - Recta</option><option value="lineplane">Recta - Pla</option><option value="planes">2 Plans</option><option value="3planes">3 Plans</option></select></div>
                        
                        <div className="space-y-4 overflow-y-auto max-h-[300px] custom-scrollbar p-1">
                            {(mode==='lines' || mode==='lineplane') && <div className="bg-blue-50 p-2 rounded border border-blue-100"><h4 className="text-xs font-bold text-blue-700 mb-1">Recta r (A, v)</h4><div className="flex gap-1 mb-1"><input type="number" value={rP.x} onChange={e=>setRP({...rP,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={rP.y} onChange={e=>setRP({...rP,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={rP.z} onChange={e=>setRP({...rP,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div><div className="flex gap-1"><input type="number" value={rV.x} onChange={e=>setRV({...rV,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={rV.y} onChange={e=>setRV({...rV,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={rV.z} onChange={e=>setRV({...rV,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div></div>}
                            {mode==='lines' && <div className="bg-red-50 p-2 rounded border border-red-100"><h4 className="text-xs font-bold text-red-700 mb-1">Recta s (B, u)</h4><div className="flex gap-1 mb-1"><input type="number" value={sP.x} onChange={e=>setSP({...sP,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={sP.y} onChange={e=>setSP({...sP,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={sP.z} onChange={e=>setSP({...sP,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div><div className="flex gap-1"><input type="number" value={sV.x} onChange={e=>setSV({...sV,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={sV.y} onChange={e=>setSV({...sV,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={sV.z} onChange={e=>setSV({...sV,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div></div>}
                            {(mode==='lineplane' || mode.includes('planes')) && <div className="bg-emerald-50 p-2 rounded border border-emerald-100"><h4 className="text-xs font-bold text-emerald-700 mb-1">Pla 1 (Punt, Normal)</h4><div className="flex gap-1 mb-1"><input type="number" value={plP.x} onChange={e=>setPlP({...plP,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={plP.y} onChange={e=>setPlP({...plP,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={plP.z} onChange={e=>setPlP({...plP,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div><div className="flex gap-1"><input type="number" value={plN.x} onChange={e=>setPlN({...plN,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={plN.y} onChange={e=>setPlN({...plN,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={plN.z} onChange={e=>setPlN({...plN,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div></div>}
                            {mode.includes('planes') && <div className="bg-orange-50 p-2 rounded border border-orange-100"><h4 className="text-xs font-bold text-orange-700 mb-1">Pla 2 (Punt, Normal)</h4><div className="flex gap-1 mb-1"><input type="number" value={pl2P.x} onChange={e=>setPl2P({...pl2P,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={pl2P.y} onChange={e=>setPl2P({...pl2P,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={pl2P.z} onChange={e=>setPl2P({...pl2P,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div><div className="flex gap-1"><input type="number" value={pl2N.x} onChange={e=>setPl2N({...pl2N,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={pl2N.y} onChange={e=>setPl2N({...pl2N,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={pl2N.z} onChange={e=>setPl2N({...pl2N,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div></div>}
                            {mode==='3planes' && <div className="bg-indigo-50 p-2 rounded border border-indigo-100"><h4 className="text-xs font-bold text-indigo-700 mb-1">Pla 3 (Punt, Normal)</h4><div className="flex gap-1 mb-1"><input type="number" value={pl3P.x} onChange={e=>setPl3P({...pl3P,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={pl3P.y} onChange={e=>setPl3P({...pl3P,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={pl3P.z} onChange={e=>setPl3P({...pl3P,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div><div className="flex gap-1"><input type="number" value={pl3N.x} onChange={e=>setPl3N({...pl3N,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={pl3N.y} onChange={e=>setPl3N({...pl3N,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={pl3N.z} onChange={e=>setPl3N({...pl3N,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div></div>}
                        </div>

                        <div className="bg-slate-50 p-2 rounded border border-slate-200 text-xs font-mono mt-2">
                           {eqText}
                        </div>

                        <div className="text-center font-bold text-lg text-slate-800 border-t pt-2">{status}</div>
                        <button onClick={showExplanation} className="w-full py-2 bg-indigo-600 text-white rounded font-bold text-xs hover:bg-indigo-700 flex items-center justify-center gap-2"><Icon path={icons.list} size={14}/> Veure Raonament Analític</button>
                    </div>
                    <div className="lg:col-span-8 bg-white rounded-xl shadow-inner border border-slate-200 overflow-hidden h-[500px]"><Scene3D objects={objects} width={800} height={500}/></div>
                </div>
            );
        };

        // --- MODULE 3: METRIC ---
        const MetricModule = () => {
            const [mode, setMode] = useState('distPtoPlane');
            const [expl, setExpl] = useState(null);
            
            // Common Points/Vectors
            const [P1, setP1] = useState({x:2,y:2,z:2});
            const [P2, setP2] = useState({x:0,y:0,z:0});
            const [V1, setV1] = useState({x:1,y:0,z:0});
            const [V2, setV2] = useState({x:0,y:1,z:0});
            
            // Dynamic Calculation
            let dist = 0, formula = "", details = "";
            let objects = [];
            let eqDisplay = "";

            if (mode === 'distPtoP') {
                dist = mod(sub(P2, P1));
                formula = `d(P, Q) = |\\vec{PQ}| = \\sqrt{(x_2-x_1)^2 + (y_2-y_1)^2 + (z_2-z_1)^2}`;
                eqDisplay = <div className="text-xs font-mono"><Latex block>{`P(${P1.x},${P1.y},${P1.z}), Q(${P2.x},${P2.y},${P2.z})`}</Latex></div>;
                objects = [{type:'point', pos:P1, color:'#ef4444', label:'P'}, {type:'point', pos:P2, color:'#3b82f6', label:'Q'}, {type:'line', start:P1, end:P2, color:'#94a3b8', dashed:true}];
            } else if (mode === 'distPtoL') {
                const AP = sub(P1, P2); // P2 is line point A
                const cp = cross(AP, V1); // V1 is line vec d
                const modD = mod(V1);
                dist = modD===0 ? 0 : mod(cp)/modD;
                formula = `d(P, r) = \\frac{|\\vec{AP} \\times \\vec{d}|}{|\\vec{d}|}`;
                eqDisplay = <div className="text-xs font-mono"><Latex block>{`P(${P1.x},${P1.y},${P1.z})`}</Latex><Latex block>{`r: `+getLineEqTex(P2,V1)}</Latex></div>;
                objects = [{type:'point', pos:P1, color:'#ef4444', label:'P'}, {type:'line', point:P2, vec:V1, color:'#3b82f6', label:'r'}];
            } else if (mode === 'distPtoPlane') {
                const D = -dot(V1, P2); // P2 is plane point, V1 is Normal
                const num = Math.abs(dot(V1, P1) + D);
                const den = mod(V1);
                dist = den===0?0:num/den;
                formula = `d(P, \\pi) = \\frac{|Ax_0+By_0+Cz_0+D|}{\\sqrt{A^2+B^2+C^2}}`;
                eqDisplay = <div className="text-xs font-mono"><Latex block>{`P(${P1.x},${P1.y},${P1.z})`}</Latex><Latex block>{`\\pi: `+getPlaneEqTex(P2,V1)}</Latex></div>;
                objects = [{type:'point', pos:P1, color:'#ef4444', label:'P'}, {type:'plane', point:P2, normal:V1, color:'#10b981'}];
            } else if (mode === 'distLines') {
                const P1P2 = sub(P2, P1);
                const cp = cross(V1, V2);
                const modCP = mod(cp);
                if (modCP < 1e-5) { // Parallel
                    dist = mod(cross(P1P2, V2)) / mod(V2);
                    formula = `d(r, s) = d(P_r, s) = \\frac{|\\vec{P_rP_s} \\times \\vec{v}|}{|\\vec{v}|} \\quad (\\text{Paral·leles})`;
                } else { // Skew
                    const mixed = Math.abs(dot(P1P2, cp));
                    dist = mixed / modCP;
                    formula = `d(r, s) = \\frac{|[\\vec{P_rP_s}, \\vec{u}, \\vec{v}]|}{|\\vec{u} \\times \\vec{v}|} \\quad (\\text{Es creuen})`;
                }
                eqDisplay = <div className="text-xs font-mono"><Latex block>{`r: `+getLineEqTex(P1,V1)}</Latex><Latex block>{`s: `+getLineEqTex(P2,V2, "\\mu")}</Latex></div>;
                objects = [{type:'line', point:P1, vec:V1, color:'#ef4444', label:'r'}, {type:'line', point:P2, vec:V2, color:'#3b82f6', label:'s'}];
            } else if (mode === 'distPlanes') {
                const D1 = -dot(V1, P1);
                const D2 = -dot(V1, P2); 
                dist = Math.abs(D2 - D1) / mod(V1);
                formula = `d(\\pi_1, \\pi_2) = \\frac{|D_2 - D_1|}{\\sqrt{A^2+B^2+C^2}}`;
                eqDisplay = <div className="text-xs font-mono"><Latex block>{`\\pi_1: `+getPlaneEqTex(P1,V1)}</Latex><Latex block>{`\\pi_2: `+getPlaneEqTex(P2,V1)}</Latex></div>;
                objects = [{type:'plane', point:P1, normal:V1, color:'#10b981'}, {type:'plane', point:P2, normal:V1, color:'#f59e0b'}];
            } else if (mode === 'projPtoL') {
                 const P1P2 = sub(P1, P2);
                 const k = dot(P1P2, V1) / dot(V1, V1);
                 const P_proj = add(P2, scale(V1, k));
                 dist = 0; 
                 formula = `\\text{Projecció } P' = Q + \\frac{\\vec{QP} \\cdot \\vec{d}}{|\\vec{d}|^2} \\vec{d}`;
                 details = `P'(${P_proj.x.toFixed(2)}, ${P_proj.y.toFixed(2)}, ${P_proj.z.toFixed(2)})`;
                 eqDisplay = <div className="text-xs font-mono"><Latex block>{`P(${P1.x},${P1.y},${P1.z})`}</Latex><Latex block>{`r: `+getLineEqTex(P2,V1)}</Latex></div>;
                 objects = [{type:'point', pos:P1, color:'#ef4444', label:'P'}, {type:'line', point:P2, vec:V1, color:'#3b82f6', label:'r'}, {type:'point', pos:P_proj, color:'#10b981', label:"P'"}];
            } else if (mode === 'projPtoPi') {
                const D = -dot(V1, P2); 
                const val = dot(V1, P1) + D;
                const den = dot(V1, V1);
                const k = -val / den;
                const P_proj = add(P1, scale(V1, k));
                dist = 0;
                formula = `\\text{Projecció } P' = P - \\frac{Ax_0+By_0+Cz_0+D}{|\\vec{n}|^2}\\vec{n}`;
                details = `P'(${P_proj.x.toFixed(2)}, ${P_proj.y.toFixed(2)}, ${P_proj.z.toFixed(2)})`;
                eqDisplay = <div className="text-xs font-mono"><Latex block>{`P(${P1.x},${P1.y},${P1.z})`}</Latex><Latex block>{`\\pi: `+getPlaneEqTex(P2,V1)}</Latex></div>;
                objects = [{type:'point', pos:P1, color:'#ef4444', label:'P'}, {type:'plane', point:P2, normal:V1, color:'#10b981'}, {type:'line', start:P1, end:P_proj, color:'#94a3b8', dashed:true}, {type:'point', pos:P_proj, color:'#3b82f6', label:"P'"}];
            }

            const showExplanation = () => {
                setExpl(<div className="space-y-4"><h4 className="font-bold text-indigo-800 border-b pb-1">Procediment</h4><div className="bg-slate-50 p-3 rounded text-center"><Latex block>{formula}</Latex></div>{details && <div className="font-mono font-bold text-center text-emerald-700">{details}</div>}{!details && <div className="font-mono font-bold text-center text-indigo-700">Resultat: {dist.toFixed(4)} u</div>}</div>);
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
                    <Modal isOpen={!!expl} onClose={()=>setExpl(null)} title="Raonament Analític">{expl}</Modal>
                    <div className="lg:col-span-4 bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-4">
                        <div className="flex justify-between items-center border-b pb-2"><h3 className="font-bold text-indigo-800 uppercase text-sm">Mètrica i Projeccions</h3><select value={mode} onChange={e=>setMode(e.target.value)} className="text-xs border rounded p-1 max-w-[150px]"><option value="distPtoP">Dist. Punt-Punt</option><option value="distPtoL">Dist. Punt-Recta</option><option value="distPtoPlane">Dist. Punt-Pla</option><option value="distLines">Dist. Recta-Recta</option><option value="distPlanes">Dist. Plans Par.</option><option value="projPtoL">Proj. Punt-Recta</option><option value="projPtoPi">Proj. Punt-Pla</option></select></div>
                        <div className="space-y-4">
                             {/* Inputs based on mode - simplified for brevity, assume reusable InputGroups */}
                             <div className="bg-red-50 p-2 rounded border border-red-100"><h4 className="text-xs font-bold text-red-700 mb-1">Objecte 1 (Punt P / Pla 1)</h4><div className="flex gap-1"><input type="number" value={P1.x} onChange={e=>setP1({...P1,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={P1.y} onChange={e=>setP1({...P1,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={P1.z} onChange={e=>setP1({...P1,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div>{mode==='distLines' && <div className="flex gap-1 mt-1"><input type="number" value={V1.x} onChange={e=>setV1({...V1,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={V1.y} onChange={e=>setV1({...V1,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={V1.z} onChange={e=>setV1({...V1,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div>}</div>
                             <div className="bg-blue-50 p-2 rounded border border-blue-100"><h4 className="text-xs font-bold text-blue-700 mb-1">Objecte 2 (Q / r / pi)</h4><div className="flex gap-1"><input type="number" value={P2.x} onChange={e=>setP2({...P2,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={P2.y} onChange={e=>setP2({...P2,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={P2.z} onChange={e=>setP2({...P2,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div>{(mode!=='distPtoP') && <div className="flex gap-1 mt-1"><input type="number" value={mode==='distLines'?V2.x:V1.x} onChange={e=>mode==='distLines'?setV2({...V2,x:Number(e.target.value)}):setV1({...V1,x:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={mode==='distLines'?V2.y:V1.y} onChange={e=>mode==='distLines'?setV2({...V2,y:Number(e.target.value)}):setV1({...V1,y:Number(e.target.value)})} className="w-10 text-xs border rounded"/><input type="number" value={mode==='distLines'?V2.z:V1.z} onChange={e=>mode==='distLines'?setV2({...V2,z:Number(e.target.value)}):setV1({...V1,z:Number(e.target.value)})} className="w-10 text-xs border rounded"/></div>}</div>
                             
                             <div className="bg-slate-50 p-2 rounded border border-slate-200 mt-2">
                                {eqDisplay}
                             </div>

                             <div className="text-center bg-white border p-3 rounded shadow-sm">{!mode.includes('proj') ? <div className="text-2xl font-bold text-indigo-700 font-mono">{dist.toFixed(4)} u</div> : <div className="text-sm font-bold text-indigo-700 font-mono">{details}</div>}</div>
                             <button onClick={showExplanation} className="w-full py-2 bg-indigo-600 text-white rounded font-bold text-xs hover:bg-indigo-700 flex items-center justify-center gap-2"><Icon path={icons.list} size={14}/> Veure Raonament Analític</button>
                        </div>
                    </div>
                    <div className="lg:col-span-8 bg-white rounded-xl shadow-inner border border-slate-200 overflow-hidden h-[500px]"><Scene3D objects={objects} width={800} height={500}/></div>
                </div>
            );
        };

        // --- MODULE 4: FORMULARY ---
        const Formulary = () => (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 p-4 overflow-y-auto custom-scrollbar h-full pb-20">
                <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><h3 className="font-bold text-indigo-800 border-b pb-2 mb-3">Vectors</h3><div className="space-y-3 text-sm"><div>Prod. Escalar: <Latex>{`\\vec{u} \\cdot \\vec{v} = |u||v|\\cos\\alpha`}</Latex></div><div>Prod. Vectorial: <Latex>{`|\\vec{u} \\times \\vec{v}| = |u||v|\\sin\\alpha`}</Latex></div><div>Prod. Mixt: <Latex>{`[\\vec{u}, \\vec{v}, \\vec{w}] = \\det(\\vec{u}, \\vec{v}, \\vec{w})`}</Latex></div></div></div>
                <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><h3 className="font-bold text-indigo-800 border-b pb-2 mb-3">Rectes i Plans</h3><div className="space-y-3 text-sm"><div>Recta (Contínua): <Latex>{`\\frac{x-a_1}{u_1} = \\frac{y-a_2}{u_2} = \\frac{z-a_3}{u_3}`}</Latex></div><div>Pla (General): <Latex>{`Ax + By + Cz + D = 0`}</Latex></div></div></div>
                <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><h3 className="font-bold text-indigo-800 border-b pb-2 mb-3">Distàncies</h3><div className="space-y-3 text-sm"><div>Punt-Pla: <Latex>{`d(P, \\pi) = \\frac{|Ax_0+By_0+Cz_0+D|}{\\sqrt{A^2+B^2+C^2}}`}</Latex></div><div>Punt-Recta: <Latex>{`d(P, r) = \\frac{|\\vec{AP} \\times \\vec{d}|}{|\\vec{d}|}`}</Latex></div><div>Recta-Recta (Creuades): <Latex>{`d(r, s) = \\frac{|[\\vec{AB}, \\vec{u}, \\vec{v}]|}{|\\vec{u} \\times \\vec{v}|}`}</Latex></div></div></div>
                <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm"><h3 className="font-bold text-indigo-800 border-b pb-2 mb-3">Posicions Relatives</h3><div className="space-y-3 text-sm">
                    <div><strong>Recta-Pla:</strong> Estudiar rang M (Matriu <Latex>{`\\vec{n}`}</Latex> i <Latex>{`\\vec{d}`}</Latex>) i M'.</div>
                    <div>Rang M=1, M'=2: Paral·lels. Rang M=2, M'=2: Secants.</div>
                    <div><strong>Recta-Recta:</strong> M (vectors directors), M' (amb vector punts).</div>
                    <div>R(M)=2, R(M')=3: Es creuen. R(M)=2, R(M')=2: Es tallen.</div>
                    <div><strong>3 Plans:</strong> R(M)=3, R(M')=3: Triedre (Punt).</div>
                    <div>R(M)=2, R(M')=3: Prisma. R(M)=2, R(M')=2: Fascicle (Recta).</div>
                </div></div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [tab, setTab] = useState('vectors');

            return (
                <div className="min-h-screen font-sans text-slate-900 bg-slate-50 flex flex-col pb-10">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm flex-none">
                        <div className="w-[98%] mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-600 p-2 rounded-lg text-white"><Icon path={icons.cube} size={24} /></div>
                                <div><h1 className="text-xl font-bold text-slate-800 tracking-tight">Laboratori 3D</h1><p className="text-xs text-slate-500 font-medium uppercase tracking-wide">Geometria Analítica 2n Batx</p></div>
                            </div>
                            <nav className="flex bg-slate-100 p-1 rounded-lg border border-slate-200 overflow-x-auto">
                                <button onClick={()=>setTab('vectors')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all whitespace-nowrap ${tab==='vectors'?'bg-white text-indigo-700 shadow-sm':'text-slate-500 hover:text-slate-700'}`}><Icon path={icons.vector} size={16}/> Vectors</button>
                                <button onClick={()=>setTab('pos')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all whitespace-nowrap ${tab==='pos'?'bg-white text-indigo-700 shadow-sm':'text-slate-500 hover:text-slate-700'}`}><Icon path={icons.layers} size={16}/> Posicions</button>
                                <button onClick={()=>setTab('metric')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all whitespace-nowrap ${tab==='metric'?'bg-white text-indigo-700 shadow-sm':'text-slate-500 hover:text-slate-700'}`}><Icon path={icons.ruler} size={16}/> Mètrica i Proj.</button>
                                <button onClick={()=>setTab('formula')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all whitespace-nowrap ${tab==='formula'?'bg-white text-indigo-700 shadow-sm':'text-slate-500 hover:text-slate-700'}`}><Icon path={icons.book} size={16}/> Formulari</button>
                            </nav>
                        </div>
                    </header>
                    <main className="flex-1 w-[98%] mx-auto mt-6 animate-[fadeIn_0.5s] h-full pb-6">
                        {tab === 'vectors' && <VectorModule />}
                        {tab === 'pos' && <PositionsModule />}
                        {tab === 'metric' && <MetricModule />}
                        {tab === 'formula' && <Formulary />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
